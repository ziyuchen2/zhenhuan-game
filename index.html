  { id:'noble_help', name:'贵人相助', icon:'🤝', art:'./学堂/贵人援助.png', desc:'下次亏钱减半', cost:200, effect:'下次扣钱事件减免一半' },

  { id:'awaken_study', name:'觉醒大悟', icon:'<img src="./数值/觉醒.PNG" style="width:16px;height:16px;vertical-align:middle">', art:'./学堂/研读觉醒.png', desc:'研读女性先贤传记', cost:280, effect:'觉醒 +6' },

  { id:'favor_charm', name:'魅力提升', icon:'✨', art:'./学堂/魅力提升.png', desc:'恩宠立即 +15', cost:220, effect:'恩宠 +15' },

  { id:'silver_find', name:'寻宝秘术', icon:'🗝️', art:'./学堂/寻宝.png', desc:'立即获得一笔银子', cost:150, effect:'银两 +300' },

];

function getAcademySkillById(skillId='') {

  return ACADEMY_SKILLS.find(skill => skill.id === skillId) || null;

}

function findAcademySkillByText(...parts) {

  const text = parts.filter(Boolean).join(' ');

  return ACADEMY_SKILLS.find(skill => text.includes(skill.name)) || null;

}

function getAcademySkillIconHTML(skillOrId, { className='academy-skill-icon', title='' } = {}) {

  const skill = typeof skillOrId === 'string' ? getAcademySkillById(skillOrId) : skillOrId;

  if (!skill) return '';

  if (skill.art) return `<img class="${className}" src="${skill.art}" alt="${title || skill.name}" draggable="false">`;

  return `<span class="${className} academy-skill-fallback">${skill.icon || '📖'}</span>`;

}

function getAcademySkillBadgeHTML(skillId='') {

  const skill = getAcademySkillById(skillId);

  if (!skill) return `<span>${skillId}</span>`;

  return `<span class="academy-skill-badge">${getAcademySkillIconHTML(skill, { className:'academy-skill-icon academy-skill-icon-inline', title:skill.name })}<span>${skill.name}</span></span>`;

}



function handleAcademy(player) {

  // Pick 2 random skills to offer

  const shuffled = [...ACADEMY_SKILLS].sort(() => Math.random() - 0.5);

  const offered = shuffled.slice(0, 2);



  if (player.isAI) {

    setTimeout(() => {

      // AI decides: buy if can afford the cheaper one

      const hasAcademyDiscount = player.talentBonus && player.talentBonus.type === 'calm_mind';

      const getCost = (s) => hasAcademyDiscount ? Math.floor(s.cost * (1 - player.talentBonus.skillDiscount)) : s.cost;

      const affordable = offered.filter(s => player.silver >= getCost(s));

      if (affordable.length > 0 && player.silver >= getCost(affordable[0]) + 200) {

        const chosen = affordable[Math.floor(Math.random() * affordable.length)];

        addLog(`${player.emoji} ${player.name} 路过学堂，未学习。`);

        renderBoard(); renderPlayerList(); finishTurn();

      }

    }, AI_DELAY.decision);

  } else {

    showAcademyMenu(player, offered);

  }

}




function applyAcademySkill(player, skill) {

  // 端妃天赋：学堂技能费用-20%

  let cost = skill.cost;

  if (player.talentBonus && player.talentBonus.type === 'calm_mind') {

    cost = Math.floor(cost * (1 - player.talentBonus.skillDiscount));

  }

  player.silver -= cost;

  switch(skill.id) {

    case 'cold_immune':

      // Add to skills list (consumable)

      player.skills.push('cold_immune');

      break;

    case 'rent_boost':

      if (!player.skills.includes('rent_boost')) player.skills.push('rent_boost');

      break;

    case 'noble_help':

      player.skills.push('noble_help');

      break;

    case 'awaken_study':

      player.awakening += 6;

      break;

    case 'favor_charm':

      player.favorPoints += 15;

      break;

    case 'silver_find':

      player.silver += 300;

      break;

  }

}

// ===== 宫殿觉醒奖励（每买1个宫殿+1觉醒）=====

function checkPropertyAwakening(player) {

  const propCount = player.properties.length;

  // 每拥有1个宫殿获得1点觉醒奖励（买+1，卖-1，买卖对称）

  const awakenFromProps = propCount;

  // 记录之前因宫殿获得的觉醒值

  const prevAwakenFromProps = player._propAwaken || 0;

  if (awakenFromProps > prevAwakenFromProps) {

    const gain = awakenFromProps - prevAwakenFromProps;

    player.awakening += gain;

    player._propAwaken = awakenFromProps;

    addLog(`${player.emoji} ${player.name} 购入新宫殿，势力扩大！觉醒 +${gain}`, 'success');

    return gain;

  } else if (awakenFromProps < prevAwakenFromProps) {

    // 出售宫殿导致觉醒减少

    player._propAwaken = awakenFromProps;

  }

  return 0;

}



// ===== 主动出售宫殿 =====

function getPropertySellPrice(tile) {

  return Math.floor(tile.price * 0.5 * (1 + tile.level * 0.3));

}



// ===== 总资产计算 =====

function calcTotalAsset(player) {

  let propValue = 0;

  player.properties.forEach(idx => {

    const t = gameState.tiles[idx];

    if (!t) return;

    propValue += Math.floor(t.price * 1.5 * (1 + t.level * 0.3));

  });

  return player.silver + propValue;

}

function getAccelMultiplier() {

  if (gameState.accelerateFrom > 0 && gameState.turnNumber >= gameState.accelerateFrom) return 2;

  return 1;

}

  } else {
    portraitWrap.innerHTML = `<span class="portrait-fallback">${winner.emoji}</span>`;
  }

  // 标题
  document.getElementById('winner-title').textContent = title || '天 下 归 心';

  // 冠军名字
  const winnerNameEl = document.getElementById('winner-name');
  winnerNameEl.textContent = subtitle || `${winner.name}`;

  // 冠军数据
  document.getElementById('winner-stats').textContent = statsText || '';

  // 排名列表
  const rankingEl = document.getElementById('winner-ranking');
  const medalImgs = ['./数值/第一名.png', './数值/第二名.png', './数值/第三名.png'];
  const medals = medalImgs.map(src => `<img src="${src}" style="width:28px;height:28px;vertical-align:middle;object-fit:contain" draggable="false">`);

  // 构建所有玩家排名数据
  const allPlayers = gameState.players.map(p => {
    const score = scoreFn ? scoreFn(p) : calcTotalAsset(p);
    return {
      player: p,
      score: score,
      isBankrupt: p.status === 'bankrupt',
      isWinner: p.id === winner.id,
    };
  });

  // 排序：冠军第一，然后非破产按分数降序，破产排最后
  allPlayers.sort((a, b) => {
    if (a.isWinner) return -1;
    if (b.isWinner) return 1;
    if (a.isBankrupt && !b.isBankrupt) return 1;
    if (!a.isBankrupt && b.isBankrupt) return -1;
    return b.score - a.score;
  });

  let rankingHTML = '<h3><img src="./数值/记事本.png" style="width:18px;height:18px;vertical-align:middle;margin-right:4px;object-fit:contain" draggable="false"> 最 终 排 名</h3>';
  allPlayers.forEach((item, idx) => {
    const p = item.player;
    const pIsYou = isHuman(p);
    const pTheme = getCharacterTheme(p.name);
    const pPortrait = getPortraitPathByName(p.name);
    const rankClass = item.isBankrupt ? 'wr-bankrupt' : idx === 0 ? 'wr-rank-1' : idx === 1 ? 'wr-rank-2' : idx === 2 ? 'wr-rank-3' : 'wr-rank-other';
    const medal = item.isBankrupt ? '💀' : (medals[idx] || `<img src="./数值/第四名.png" style="width:28px;height:28px;vertical-align:middle;object-fit:contain" draggable="false">`);
    const avatarHTML = pPortrait
      ? `<img src="${pPortrait}" alt="${p.name}" style="border-color:${pTheme.accent}">`
      : `<span style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:1.8rem">${p.emoji}</span>`;

    rankingHTML += `
      <div class="wr-item ${rankClass} ${pIsYou ? 'wr-is-you' : ''}">
        <div class="wr-medal">${medal}</div>
        <div class="wr-avatar" style="border-color:${pTheme.accent}">${avatarHTML}</div>
        <div class="wr-info">
          <div class="wr-name">
            ${p.name}
            ${pIsYou ? '<span class="wr-you-tag">你</span>' : '<span class="wr-ai-tag">AI</span>'}
          </div>
          <div class="wr-detail">
            <span><img src="./数值/银两.PNG" style="width:14px;height:14px;vertical-align:middle;margin-right:2px">${p.silver}</span>
            <span><img src="./数值/恩宠.PNG" style="width:14px;height:14px;vertical-align:middle;margin-right:2px;object-fit:contain">${p.favorPoints}</span>
            <span><img src="./数值/觉醒.PNG" style="width:14px;height:14px;vertical-align:middle;margin-right:2px">${p.awakening}</span>
            <span><img src="./棋盘图标/宫殿.PNG" style="width:14px;height:14px;vertical-align:middle;margin-right:2px;object-fit:contain">${p.properties.length}</span>
          </div>
        </div>
        <div class="wr-score">${item.isBankrupt ? '淘汰' : item.score}</div>
      </div>
    `;
  });

  rankingEl.innerHTML = rankingHTML;

  screen.style.display = 'flex';
  document.getElementById('btn-restart').onclick = () => location.reload();
}

// ===== 综合胜利检查（觉醒+恩宠+财富）=====

function checkAllVictoryConditions(player) {

// ===== 迷失自我检查（觉醒归零）=====

function checkAwakenZero(player) {

  // 端妃天赋：觉醒不会降到5以下

  if (player.talentBonus && player.talentBonus.type === 'calm_mind' && player.awakening < player.talentBonus.minAwaken) {

    player.awakening = player.talentBonus.minAwaken;

    addLog(`${player.emoji} ${player.name} 天赋「淡然处世」生效，觉醒保持在 ${player.talentBonus.minAwaken}`, 'success');

    return; // 不触发迷失自我惩罚

  }

  if (player.awakening <= 0 && player.status !== 'bankrupt') {

    player.awakening = 5; // 重置为5

    const silverPenalty = Math.min(300, player.silver + 300); // 不让银两因此变成极端负数

    player.silver -= 300;

    player.favorPoints = Math.max(0, player.favorPoints - 8);

    addLog(`😵 ${player.emoji} ${player.name} 迷失自我！争宠心切，弄巧成拙。银两 -300，恩宠 -8，觉醒重置为5`, 'danger');

  }

}



// ===== 回合结算（限时/加速模式到达上限时）=====

function triggerFinalSettlement() {

  gameState.gameOver = true;

  gameState.phase = 'ended';



  const alivePlayers = gameState.players.filter(p => p.status !== 'bankrupt');

  // 综合评分 = 觉醒×2 + 恩宠×1.5 + 总资产÷40

  const scored = alivePlayers.map(p => ({

    player: p,

    score: Math.round(p.awakening * 2 + p.favorPoints * 1.5 + calcTotalAsset(p) / 40),

    awakening: p.awakening,

    favor: p.favorPoints,

    asset: calcTotalAsset(p),

  })).sort((a, b) => b.score - a.score);



  const winner = scored[0].player;

  addLog(`⏰ ${gameState.maxTurns} 回合结束！进入最终结算！`, 'important');

  scored.forEach((s, i) => {

    const rankIcon = i <= 2 ? `<img src="./数值/第${['一','二','三'][i]}名.png" style="width:14px;height:14px;vertical-align:middle;margin-right:2px;object-fit:contain" draggable="false">` : `<img src="./数值/第四名.png" style="width:14px;height:14px;vertical-align:middle;margin-right:2px;object-fit:contain" draggable="false">`;
    addLog(`${rankIcon} ${s.player.emoji} ${s.player.name}: ${s.score}分（觉醒${s.awakening}×2 + 恩宠${s.favor}×1.5 + 资产${s.asset}÷40）`, i === 0 ? 'important' : '');

  });



  setTimeout(() => {

    const isYou = isHuman(winner);

    showWinnerScreen({

      winner: winner,

      title: isYou ? '后 宫 之 主 · 综 合 冠 军' : '大 局 已 定 · 综 合 冠 军',

      subtitle: `${winner.name}（综合冠军·${isYou ? '你！' : 'AI'}）`,

      statsText: `综合分: ${scored[0].score} | 觉醒: ${winner.awakening} | 恩宠: ${winner.favorPoints} | 总资产: ${scored[0].asset}`,

      scoreFn: (p) => Math.round(p.awakening * 2 + p.favorPoints * 1.5 + calcTotalAsset(p) / 40),

    });

  }, 1000);

}



// =====================================================

// ============== TURN MANAGEMENT ======================

// =====================================================



function finishTurn() {

  const player = currentPlayer();



  // ===== 三维度胜利检查 =====

  if (checkAllVictoryConditions(player)) return;



  // ===== 迷失自我检查（觉醒归零）=====

  checkAwakenZero(player);



  // ===== 破产检查（含皇上救济）=====

  if (player.silver < 0) {

    if (player.properties.length > 0 && player.silver >= -500) {

      handleSellProperty(player);

      return;

    }

    // 破产保护：恩宠高时皇上施恩

    if (!player._bankruptSaved) {

      if (player.favorPoints >= 50) {

        player._bankruptSaved = true;

        player.silver += 500;

        player.favorPoints -= 20;

        addLog(`👑💕 ${player.emoji} ${player.name} 濒临破产，皇上心疼爱妃，特赐五百两！恩宠 -20`, 'success');

      } else if (player.favorPoints >= 30) {

        player._bankruptSaved = true;

        player.silver += 300;

        player.favorPoints -= 15;

        addLog(`👑 ${player.emoji} ${player.name} 濒临破产，皇上念及旧情，赏三百两度日。恩宠 -15`, 'success');

      } else {

        // 恩宠太低，无人相救

        player.status = 'bankrupt';

        addLog(`💀 ${player.emoji} ${player.name} 银两耗尽，无人相救，被逐出后宫！`, 'danger');

        player.properties.forEach(idx => {

          gameState.tiles[idx].ownerId = null;

          gameState.tiles[idx].level = 0;

        });

        player.properties = [];

      }

    } else {

      // 已被救过一次，第二次破产直接淘汰

      player.status = 'bankrupt';

      addLog(`💀 ${player.emoji} ${player.name} 再次银两耗尽，皇恩不可再求，被逐出后宫！`, 'danger');

      player.properties.forEach(idx => {

        gameState.tiles[idx].ownerId = null;

        gameState.tiles[idx].level = 0;

      });

      player.properties = [];

    }

  }



  // ===== 恩宠归零检查（失宠/彻底失宠）=====

  if (player.favorPoints <= 0 && player.status !== 'bankrupt') {

    if (player.hasShield) {

      player.hasShield = false;

      player.favorPoints = 10;

      addLog(`<img src="./数值/令牌.png" style="width:14px;height:14px;vertical-align:middle;margin-right:2px;object-fit:contain" draggable="false"> ${player.emoji} ${player.name} 恩宠耗尽，但免死金牌保住了地位！`, 'success');

    } else if (player.status !== 'cold_palace') {

      player._favorZeroCount = (player._favorZeroCount || 0) + 1;

      if (player._favorZeroCount >= 2) {

        // 第二次恩宠归零：彻底失宠，淘汰

        player.status = 'bankrupt';

        addLog(`💀❄️ ${player.emoji} ${player.name} 第二次恩宠耗尽，彻底失宠，永不得出冷宫！`, 'danger');

        player.properties.forEach(idx => {

          gameState.tiles[idx].ownerId = null;

          gameState.tiles[idx].level = 0;

        });

        player.properties = [];

      } else {

        // 第一次恩宠归零：冷宫3轮

        player.status = 'cold_palace';

        player.jailTurns = 3;

        player.favorPoints = 10;

        const jailIdx = gameState.tiles.findIndex(t => t.type === 'jail');

        player.position = jailIdx >= 0 ? jailIdx : 24;

        addLog(`❄️ ${player.emoji} ${player.name} 恩宠耗尽，皇上震怒，打入冷宫 3 轮！恩宠重置为 10`, 'danger');

      }

    }

  }



  // ===== 存活胜利检查 =====

  const alivePlayers = gameState.players.filter(p => p.status !== 'bankrupt');

  if (alivePlayers.length === 1) {

    declareWinner(alivePlayers[0]);

    return;

  }

  if (alivePlayers.length === 0) {

    declareWinner(gameState.players.reduce((a, b) => a.silver > b.silver ? a : b));

    return;

  }



  renderBoard();

  renderPlayerList();

  renderTokens();



  nextPlayer();

}



function handleSellProperty(player) {

  const propTiles = player.properties.map(idx => gameState.tiles[idx]);

  const cheapest = propTiles.reduce((a, b) => a.price < b.price ? a : b);

  const sellPrice = getPropertySellPrice(cheapest);



  if (player.isAI) {

    // AI always sells to survive

    setTimeout(() => {

      player.silver += sellPrice;

      cheapest.ownerId = null;

      cheapest.level = 0;

      player.properties = player.properties.filter(idx => idx !== cheapest.index);

      player.awakening = Math.max(0, player.awakening - 1);

      checkPropertyAwakening(player);

      addLog(`${player.emoji} ${player.name} 变卖了「${cheapest.name}」获得 ${sellPrice} 两，觉醒 -1。`, 'danger');

      showEventCard({type:'warn',icon:'<img src="./棋盘图标/宫殿.PNG" style="width:14px;height:14px;vertical-align:middle;margin-right:2px;object-fit:contain" draggable="false">',title:'【变卖宫殿】',who:`${player.emoji} ${player.name}`,

        text:`变卖了「${cheapest.name}」以求自保。`,effect:`银两 +${sellPrice}, 觉醒 -1`,

        autoClose:true,autoCloseMs:3500,onAutoClose:()=>{renderBoard();renderPlayerList();finishTurn();}});

    }, AI_DELAY.decision);

  } else {

    showModal('<img src="./棋盘图标/宫殿.PNG" style="width:18px;height:18px;vertical-align:middle;object-fit:contain" draggable="false">', '变卖宫殿',

      `你银两不足(${player.silver}两)！\n可以变卖「${cheapest.name}」获得 ${sellPrice} 两（觉醒 -1）。`,

      [

        { text:`变卖${cheapest.name} (+${sellPrice}两)`, class:'danger', action:()=>{

          player.silver += sellPrice;

          cheapest.ownerId = null;

          cheapest.level = 0;

          player.properties = player.properties.filter(idx => idx !== cheapest.index);

          player.awakening = Math.max(0, player.awakening - 1);

          checkPropertyAwakening(player);

          addLog(`${player.emoji} ${player.name} 变卖了「${cheapest.name}」获得 ${sellPrice} 两，觉醒 -1。`, 'danger');

          closeModal(); finishTurn();

        }},

        { text:'宣告破产', class:'secondary', action:()=>{

          player.status = 'bankrupt';

          player.properties.forEach(idx => {

            gameState.tiles[idx].ownerId = null;

            gameState.tiles[idx].level = 0;

          });

          player.properties = [];

          addLog(`💀 ${player.emoji} ${player.name} 宣告破产，被逐出后宫！`, 'danger');

          closeModal(); finishTurn();

        }},

      ]);

  }

}



function nextPlayer() {

  let attempts = 0;

  do {

    gameState.currentPlayerIndex = (gameState.currentPlayerIndex + 1) % gameState.players.length;

    if (gameState.currentPlayerIndex === 0) {

      gameState.turnNumber++;

      // 回合数限制检查

      if (gameState.maxTurns > 0 && gameState.turnNumber > gameState.maxTurns) {

        triggerFinalSettlement();

        return;

      }

      // 加速模式提示

      if (gameState.accelerateFrom > 0 && gameState.turnNumber === gameState.accelerateFrom) {

        addLog(`🔥🔥🔥 第 ${gameState.accelerateFrom} 回合！加速模式启动！所有数值增减翻倍！`, 'important');

      }

    }

    attempts++;

    if (attempts > gameState.players.length * 2) break;

  } while (gameState.players[gameState.currentPlayerIndex].status === 'bankrupt');



  const player = currentPlayer();

  updateTurnInfo();

  updateTurnBanner();

  renderPlayerList();

  renderTokens();



  // Handle skip turns

  if (player.skipTurns > 0) {

    player.skipTurns--;

    addLog(`${player.emoji} ${player.name} 因故停赛一轮。`);

    setTimeout(nextPlayer, 800);

    return;

  }



  // Handle jail

  if (player.status === 'cold_palace') {

    player.jailTurns--;

    if (player.jailTurns <= 0) {

      player.status = 'normal';

      addLog(`${player.emoji} ${player.name} 冷宫禁足结束，恢复自由！`, 'success');

    } else {

      addLog(`${player.emoji} ${player.name} 还在冷宫中（剩余 ${player.jailTurns} 轮）。`);



      if (player.silver >= 500) {

        if (player.isAI) {

          setTimeout(() => {

            if (aiDecideBail(player)) {

              player.silver -= 500;

              player.status = 'normal';

              player.jailTurns = 0;

              addLog(`${player.emoji} ${player.name} 花费 500 两保释！`, 'success');

              renderPlayerList();

              // AI continues turn after bail

              gameState.phase = 'roll';

              updateActions();

              setTimeout(() => startAITurn(), AI_DELAY.beforeRoll);

            } else {

              setTimeout(nextPlayer, 500);

            }

          }, AI_DELAY.decision);

          return;

        } else {

          showModal('<img src="./棋盘图标/冷宫.PNG" style="width:14px;height:14px;vertical-align:middle;margin-right:2px;object-fit:contain" draggable="false">', '冷宫禁足中',

            `你还在冷宫（剩余${player.jailTurns}轮），是否花500两保释？`,

            [

              { text:'保释 (500两)', class:'primary', action:()=>{

                player.silver -= 500;

                player.status = 'normal';

                player.jailTurns = 0;

                addLog(`${player.emoji} ${player.name} 花费 500 两保释！`, 'success');

                closeModal();

                gameState.phase = 'roll';

                updateActions();

                renderPlayerList();

              }},

              { text:'继续等', class:'secondary', action:()=>{

                closeModal();

                setTimeout(nextPlayer, 500);

              }},

            ]);

          return;

        }

      }



      setTimeout(nextPlayer, player.isAI ? 600 : 1000);

      return;

    }

  }



  // ===== 内心抉择检查 =====

  if (shouldTriggerDilemma(player)) {

    triggerDilemma(player, () => {

      gameState.phase = 'roll';

      updateActions();

      if (player.isAI) {

        addLog(`轮到 ${player.emoji} ${player.name}（AI）行动。`, 'important');

        setTimeout(() => startAITurn(), AI_DELAY.beforeRoll);

      } else {

        addLog(`轮到你 ${player.emoji} ${player.name} 行动。`, 'important');

      }

    });

    return;

  }



  gameState.phase = 'roll';

  updateActions();



  if (player.isAI) {

    addLog(`轮到 ${player.emoji} ${player.name}（AI）行动。`, 'important');

    setTimeout(() => startAITurn(), AI_DELAY.beforeRoll);

  } else {

    addLog(`轮到你 ${player.emoji} ${player.name} 行动。`, 'important');

  }

}



// =====================================================

// ============== INNER DILEMMA ========================

// =====================================================



function shouldTriggerDilemma(player) {

  // 玩家至少经过起点一次后才能触发（确保走完一圈再面对抉择）

  if (player.laps < 1) return false;

  // 距离上次触发至少间隔3回合

  if (gameState.turnNumber - gameState.lastDilemmaTurn < 3) return false;

  // 还有可用的事件

  const available = DILEMMA_EVENTS.filter(d => !gameState.dilemmaUsed.includes(d.id));

  if (available.length === 0) return false;

  // 50%概率触发（保证不会每3回合必触发，保持随机感）

  return Math.random() < 0.5;

}



function triggerDilemma(player, callback) {

  const available = DILEMMA_EVENTS.filter(d => !gameState.dilemmaUsed.includes(d.id));

  const dilemma = available[Math.floor(Math.random() * available.length)];

  gameState.dilemmaUsed.push(dilemma.id);

  gameState.lastDilemmaTurn = gameState.turnNumber;



  if (player.isAI) {

    // AI根据当前最需要的维度来选择

    setTimeout(() => {

      let choiceIdx;

      if (player.awakening >= 55) choiceIdx = 0; // 觉醒够了，选偏恩宠

      else if (player.favorPoints >= 90) choiceIdx = 1; // 恩宠够了，选偏觉醒

      else if (player.silver < 400) choiceIdx = 2; // 缺钱选偏银两

      else choiceIdx = Math.floor(Math.random() * dilemma.choices.length);

      

      const choice = dilemma.choices[choiceIdx];

      choice.apply(player);

      // 甄嬛天赋：内心抉择觉醒收益额外+3

      let dilemmaBonus = '';

      if (player.talentBonus && player.talentBonus.type === 'dilemma_awaken') {

        player.awakening += player.talentBonus.value;

        dilemmaBonus = ` (天赋: 觉醒额外+${player.talentBonus.value})`;

      }

      addLog(`${player.emoji} ${player.name} 面对内心抉择：${choice.desc}。(${choice.effect})${dilemmaBonus}`, 'important');

      showEventCard({

        type:'info', icon:dilemma.icon, title:'【内 心 抉 择】',

        who:`${player.emoji} ${player.name}`,

        text:`${dilemma.text}\n\n→ ${choice.desc}`,

        effect:choice.effect,

        autoClose:true, autoCloseMs:3500,

        onAutoClose:()=>{ checkAllVictoryConditions(player); renderBoard(); renderPlayerList(); callback(); }

      });

    }, AI_DELAY.decision);

  } else {

    // 人类玩家显示选择界面

    showModal('💭', '内心抉择', dilemma.text,

      dilemma.choices.map((ch, i) => ({

        text: ch.text,

        class: i === 0 ? 'primary' : i === 1 ? 'secondary' : 'danger',

        action: () => {

          ch.apply(player);

          // 甄嬛天赋：内心抉择觉醒收益额外+3

          let dilemmaBonus = '';

          if (player.talentBonus && player.talentBonus.type === 'dilemma_awaken') {

            player.awakening += player.talentBonus.value;

            dilemmaBonus = ` (天赋: 觉醒额外+${player.talentBonus.value})`;

          }

          addLog(`${player.emoji} ${player.name} 内心抉择：${ch.desc}。(${ch.effect})${dilemmaBonus}`, 'important');

          closeModal();

          showEventCard({

            type:'info', icon:dilemma.icon, title:'【内 心 抉 择】',

            text:`${dilemma.text}\n\n→ ${ch.desc}`,

            effect:ch.effect,

            buttons:[{text:'继续', action:()=>{ checkAllVictoryConditions(player); renderBoard(); renderPlayerList(); callback(); }}]

          });

        }

      }))

    );

  }

}

function addLog(text, type = '') {

  const log = document.getElementById('game-log');

  const entry = document.createElement('div');

  entry.className = `log-entry ${type}`;

  const time = `[${gameState.turnNumber}]`;

  // 将日志中的玩家emoji替换为人物形象小图片
  let richText = text;
  if (gameState.players && gameState.players.length > 0) {
    const sortedPlayers = [...gameState.players].sort((a,b) => b.name.length - a.name.length);
    sortedPlayers.forEach(p => {
      const portraitSrc = getPortraitPathByName(p.name);
      if (!portraitSrc) return;
      const imgTag = `<img src="${portraitSrc}" alt="${p.name}" style="width:1.2em;height:1.2em;vertical-align:-0.25em;object-fit:cover;border-radius:50%;margin-right:1px;border:1px solid ${getCharacterTheme(p.name).accent}" draggable="false">`;
      // 替换 "emoji 名字" 和 "emoji名字" 两种模式
      [`${p.emoji} ${p.name}`, `${p.emoji}${p.name}`].forEach(pattern => {
        if (richText.includes(pattern)) {
          richText = richText.split(pattern).join(`${imgTag} ${p.name}`);
        }
      });
    });
  }

  entry.innerHTML = `<span style="color:#666">${time}</span> ${richText}`;

  log.prepend(entry);

  while (log.children.length > 100) {

    log.removeChild(log.lastChild);

  }

}

    if (!gameState.players.length) { alert('请先开始游戏！'); return false; }
    return true;
  }

  function dbgTriggerEvent(player, evtType) {
    if (!player) return;
    gameState.phase = 'action';
    switch(evtType) {
      case 'beauty': handleBeautyContest(player); break;
      case 'academy': handleAcademy(player); break;
      case 'arena': handleArena(player); break;
      case 'blood_test': handleBloodTest(player); break;
      case 'feast': handleFeast(player); break;
      case 'banquet': handleBanquet(player); break;
      case 'gamble': handleGamble(player); break;
      case 'hospital': handleHospital(player); break;
      case 'jail': handleJail(player); break;

      case 'chance': {
        const chanceTiles = gameState.tiles.filter(t => t.type === 'chance');

        drawCard('good', player, cTile ? cTile.name : '圣旨');

        const chestTiles = gameState.tiles.filter(t => t.type === 'chest' && t.special !== 'blood_test');

        drawCard('bad', player, chTile ? chTile.name : '暗算');
        break;
      }
      case 'start':
        var tile = gameState.tiles.find(t => t.type === 'start');
        if (tile) triggerTileEvent(player, tile);
        break;

  document.getElementById('dbg-skip-turn').addEventListener('click', () => {

    addLog('🛠️ [调试] 银两设为6000，触发财富胜利...', 'success');

    renderPlayerList();

  document.getElementById('dbg-win-awaken').addEventListener('click', () => {

    p.awakening = 100;
    addLog('🛠️ [调试] 觉醒设为100，触发觉醒胜利...', 'success');
    renderPlayerList();

  // 传送
  document.getElementById('dbg-tp').addEventListener('click', () => {
    const row = document.getElementById('dbg-tp-row');
    if (row.style.display === 'none') {

<!-- ========== BGM MUSIC CONTROL ========== -->

<button id="bgm-btn" title="播放/暂停背景音乐">🔇</button>

<div id="bgm-slider-wrap">
  <span id="bgm-vol-label">40%</span>
  <input type="range" id="bgm-volume" min="0" max="100" value="40" title="音量">
</div>

<script>
(function(){
  const bgmAudio = new Audio('./音乐/崔轼玄 - 点秋香 (Inst_).ogg');
  bgmAudio.loop = true;
  bgmAudio.volume = 0.4;

  const bgmBtn = document.getElementById('bgm-btn');
  const bgmVolume = document.getElementById('bgm-volume');
  const bgmSlider = document.getElementById('bgm-slider-wrap');
  const bgmVolLabel = document.getElementById('bgm-vol-label');
  let bgmPlaying = false;
  let bgmUserPaused = false;
  let sliderOpen = false;
  let sliderTimer = null;

  // 展开/收起滑块
  function openSlider(){
    sliderOpen = true;
    bgmSlider.classList.add('open');
    clearTimeout(sliderTimer);
    // 3秒无操作自动收起
    sliderTimer = setTimeout(closeSlider, 3000);
  }
  function closeSlider(){
    sliderOpen = false;
    bgmSlider.classList.remove('open');
  }

  // 滑块区域交互时保持展开
  bgmSlider.addEventListener('mouseenter', ()=>{ clearTimeout(sliderTimer); });
  bgmSlider.addEventListener('mouseleave', ()=>{ sliderTimer = setTimeout(closeSlider, 1500); });
  bgmSlider.addEventListener('touchstart', ()=>{ clearTimeout(sliderTimer); }, {passive:true});
  bgmSlider.addEventListener('touchend', ()=>{ sliderTimer = setTimeout(closeSlider, 2000); }, {passive:true});

  // 点击按钮：短按 = 播放/暂停，长按 = 展开滑块
  let pressTimer = null;
  let isLongPress = false;

  bgmBtn.addEventListener('mousedown', (e)=>{
    isLongPress = false;
    pressTimer = setTimeout(()=>{ isLongPress = true; openSlider(); }, 400);
  });
  bgmBtn.addEventListener('mouseup', ()=>{
    clearTimeout(pressTimer);
    if(!isLongPress){
      toggleBGM();
      // 短按也展开滑块一小会儿
      openSlider();
    }
  });
  bgmBtn.addEventListener('mouseleave', ()=>{ clearTimeout(pressTimer); });

  // 点击页面其他地方收起滑块
  document.addEventListener('click', (e)=>{
    if(sliderOpen && !bgmBtn.contains(e.target) && !bgmSlider.contains(e.target)){
      closeSlider();
    }
  });

  // 播放/暂停
  function toggleBGM(){
    if(bgmPlaying){
      bgmAudio.pause();
      bgmPlaying = false;
      bgmUserPaused = true;
      bgmBtn.textContent = '🔇';
      bgmBtn.classList.remove('playing');
    } else {
      bgmAudio.play().then(()=>{
        bgmPlaying = true;
        bgmUserPaused = false;
        bgmBtn.textContent = '🎵';
        bgmBtn.classList.add('playing');
      }).catch(()=>{});
    }
  }

  // 音量控制
  bgmVolume.addEventListener('input', function(){
    const vol = this.value / 100;
    bgmAudio.volume = vol;
    bgmVolLabel.textContent = this.value + '%';
    if(vol === 0){
      bgmBtn.textContent = '🔇';
    } else if(bgmPlaying){
      bgmBtn.textContent = '🎵';
    }
    // 操作时重置自动收起计时
    clearTimeout(sliderTimer);
    sliderTimer = setTimeout(closeSlider, 3000);
  });

  // 用户首次交互时自动播放
  function autoPlayOnInteraction(){
    if(!bgmPlaying && !bgmUserPaused){
      bgmAudio.play().then(()=>{
        bgmPlaying = true;
        bgmBtn.textContent = '🎵';
        bgmBtn.classList.add('playing');
      }).catch(()=>{});
    }
    document.removeEventListener('click', autoPlayOnInteraction);
    document.removeEventListener('keydown', autoPlayOnInteraction);
  }
  document.addEventListener('click', autoPlayOnInteraction);
  document.addEventListener('keydown', autoPlayOnInteraction);

  // 页面隐藏/显示时暂停/恢复
  document.addEventListener('visibilitychange', function(){
    if(document.hidden){
      if(bgmPlaying){ bgmAudio.pause(); }
    } else {
      if(bgmPlaying && !bgmUserPaused){ bgmAudio.play().catch(()=>{}); }
    }
  });

})();
</script>

  <svg class="rotate-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">

<nav class="mobile-nav" id="mobile-nav">
  <div class="mobile-nav-inner">
    <button class="mobile-nav-btn active" data-panel="board" onclick="mobileShowPanel('board')">
      <img src="./棋盘图标/养心殿.PNG" draggable="false"> 棋盘
    </button>
    <button class="mobile-nav-btn" data-panel="players" onclick="mobileShowPanel('players')">
      <img src="./数值/旗头.png" draggable="false"> 嫔妃
    </button>
    <button class="mobile-nav-btn" data-panel="actions" onclick="mobileShowPanel('actions')">
      <img src="./数值/指南.png" draggable="false"> 行动
    </button>
    <button class="mobile-nav-btn" data-panel="log" onclick="mobileShowPanel('log')">
      <img src="./棋盘图标/圣旨.PNG" draggable="false"> 记事
    </button>
  </div>

<script>
// ========== 移动端适配 ==========
(function(){
  const isMobile = () => window.innerWidth <= 900 || window.innerHeight <= 500;
  const isLandscape = () => window.innerWidth > window.innerHeight;
  const isLandscapeMobile = () => window.innerHeight <= 500 && isLandscape();
  let rotateHintDismissed = false;

  // 横屏提示
  window.dismissRotateHint = function(){
    rotateHintDismissed = true;
    const hint = document.getElementById('rotate-hint');
    if(hint) hint.classList.remove('game-active');
  };

  function checkRotateHint(){
    const hint = document.getElementById('rotate-hint');
    if(!hint) return;
    const gc = document.getElementById('game-container');
    const gameActive = gc && gc.style.display !== 'none';
    if(gameActive && !rotateHintDismissed && window.innerWidth <= 900 && !isLandscape()){
      hint.classList.add('game-active');
    } else {
      hint.classList.remove('game-active');
    }
  }

  // 面板切换
  window.mobileShowPanel = function(panel){
    if(!isMobile() || isLandscapeMobile()) return;
    const left = document.querySelector('.left-panel');
    const right = document.querySelector('.right-panel');
    const navBtns = document.querySelectorAll('.mobile-nav-btn');

    // 更新底栏高亮
    navBtns.forEach(b => b.classList.toggle('active', b.dataset.panel === panel));

    // 隐藏所有面板
    left.classList.remove('mobile-show');
    right.classList.remove('mobile-show');

    if(panel === 'players'){
      left.classList.add('mobile-show');
    } else if(panel === 'actions' || panel === 'log'){
      right.classList.add('mobile-show');
      // 滚动到对应区域
      const target = panel === 'actions' 
        ? right.querySelector('.action-area') 
        : right.querySelector('.log-area');
      if(target) setTimeout(() => target.scrollIntoView({behavior:'smooth',block:'start'}), 50);
    }
    // 'board' 不需要显示面板
  };

  // 棋盘自适应缩放
  function scaleBoardForMobile(){
    const board = document.querySelector('.board-wrapper');
    if(!board) return;

    // 电脑端不缩放
    if(window.innerWidth > 900 && window.innerHeight > 500){
      board.style.transform = '';
      board.style.marginBottom = '';
      board.style.marginLeft = '';
      return;
    }

    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const boardW = 1284;
    const boardH = 980;

    let scale;
    if(isLandscapeMobile()){
      // 横屏：三栏布局，中间区域宽度约等于 vw - 360（左180+右180）
      const centerW = vw - 360;
      const centerH = vh - 30; // 减去 header
      scale = Math.min(centerW / boardW, centerH / boardH, 1);
    } else {
      // 竖屏
      scale = Math.min((vw - 8) / boardW, 1);
    }

    board.style.transform = `scale(${scale})`;
    board.style.transformOrigin = 'top left';
    // 缩放后修正容器高度和居中
    const scaledH = boardH * scale;
    const scaledW = boardW * scale;
    board.style.marginBottom = `${scaledH - boardH}px`;
    const container = board.parentElement;
    const containerW = container ? container.clientWidth : vw;
    board.style.marginLeft = `${Math.max(0,(containerW - scaledW) / 2)}px`;
  }

  // 给左/右面板添加关闭按钮（仅移动端显示）
  function injectMobileCloseButtons(){
    const panels = [document.querySelector('.left-panel'), document.querySelector('.right-panel')];
    panels.forEach(panel => {
      if(!panel || panel.querySelector('.mobile-panel-close')) return;
      const closeDiv = document.createElement('div');
      closeDiv.className = 'mobile-panel-close';
      closeDiv.innerHTML = '<button onclick="mobileShowPanel(\'board\')" title="返回棋盘">✕</button>';
      panel.insertBefore(closeDiv, panel.firstChild);
    });
  }

  // 横屏时清除竖屏面板状态
  function onOrientationAdjust(){
    setTimeout(()=>{
      scaleBoardForMobile();
      checkRotateHint();
      // 横屏模式下，清除 mobile-show 类（由 CSS grid 控制面板显示）
      if(isLandscapeMobile()){
        const left = document.querySelector('.left-panel');
        const right = document.querySelector('.right-panel');
        if(left) left.classList.remove('mobile-show');
        if(right) right.classList.remove('mobile-show');
      }
    }, 300);
  }

  // 初始化
  function initMobile(){
    scaleBoardForMobile();
    injectMobileCloseButtons();
    checkRotateHint();
  }

  // 监听
  window.addEventListener('resize', () => { scaleBoardForMobile(); checkRotateHint(); });
  window.addEventListener('orientationchange', onOrientationAdjust);

  // DOM Ready
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', initMobile);
  } else {
    initMobile();
  }

  // 游戏开始后重新缩放 + 显示横屏提示
  const origStartGame = window.startGame;
  if(typeof origStartGame === 'function'){
    window.startGame = function(){
      origStartGame.apply(this, arguments);
      setTimeout(()=>{ scaleBoardForMobile(); checkRotateHint(); }, 300);
    };
  }

  // 也在 MutationObserver 监听 game-container 显示时缩放
  const gc = document.getElementById('game-container');
  if(gc){
    new MutationObserver(() => {
      if(gc.style.display !== 'none'){
        setTimeout(scaleBoardForMobile, 100);
        setTimeout(checkRotateHint, 150);
      }
    }).observe(gc, {attributes:true, attributeFilter:['style']});
  }
})();
</script>
