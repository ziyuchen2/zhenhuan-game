<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>甄嬛传大富翁</title>

<style>

/* ===================== CSS RESET & BASE ===================== */

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{

  --gold:#d4a017;--gold-light:#f5d76e;--red:#c0392b;--red-dark:#8b0000;

  --jade:#2e8b57;--jade-dark:#1a5c38;--purple:#6c3483;--purple-light:#a569bd;

  --bg:#1a0a0a;--panel:#2a1515;--panel-border:#5a3030;--text:#f0e6d3;

  --text-dim:#a09080;--tile-bg:#3a2020;--tile-border:#6a4040;

}

html{font-size:14px}

body{

  font-family:'Microsoft YaHei','PingFang SC','Noto Serif SC',serif;

  background:var(--bg);color:var(--text);overflow-x:hidden;

  min-height:100vh;

}



/* ===================== LOADING SCREEN ===================== */

#loading-screen{

  position:fixed;inset:0;z-index:9999;

  background:#2a0a0a;

  display:flex;flex-direction:column;align-items:center;justify-content:center;

  transition:opacity 0.8s;

}

#loading-screen.hidden{opacity:0;pointer-events:none}

#loading-screen h1{

  font-size:3rem;color:var(--gold);text-shadow:0 0 30px rgba(212,160,23,0.5);

  margin-bottom:1rem;letter-spacing:0.5rem;

}

#loading-screen p{color:var(--text-dim);font-size:1.1rem;margin-bottom:2rem}

.loading-bar{width:300px;height:6px;background:#333;border-radius:3px;overflow:hidden}

.loading-bar-inner{height:100%;width:0;background:var(--gold);border-radius:3px;transition:width 0.3s}



/* ===================== START SCREEN ===================== */

#start-screen{

  position:fixed;inset:0;z-index:8888;

  background:#2a0a0a;

  display:none;flex-direction:column;align-items:center;justify-content:center;

}

#start-screen h1{

  font-size:3.5rem;color:var(--gold);text-shadow:0 0 40px rgba(212,160,23,0.6);

  margin-bottom:0.5rem;letter-spacing:1rem;

}

#start-screen .subtitle{color:var(--red);font-size:1.3rem;margin-bottom:2.5rem;letter-spacing:0.3rem}

.player-select{

  display:flex;gap:1.5rem;margin-bottom:2rem;flex-wrap:wrap;justify-content:center;

}

.player-card{

  width:140px;padding:1rem;border:2px solid var(--tile-border);border-radius:12px;

  background:var(--panel);text-align:center;cursor:pointer;transition:all 0.3s;

  position:relative;

}

.player-card:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:0 8px 20px rgba(212,160,23,0.2)}

.player-card.selected{border-color:var(--gold);background:rgba(212,160,23,0.15)}

.player-card .avatar{font-size:3rem;margin-bottom:0.5rem}

.player-card .pname{font-size:1rem;color:var(--gold-light);font-weight:bold}

.player-card .pdesc{font-size:0.75rem;color:var(--text-dim);margin-top:0.3rem}

.player-card .check{

  position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;

  background:var(--gold);color:#000;font-weight:bold;display:none;

  align-items:center;justify-content:center;font-size:0.8rem;

}

.player-card.selected .check{display:flex}

.start-hint{color:var(--text-dim);font-size:0.9rem;margin-bottom:1.5rem}

#btn-start-game{

  padding:0.8rem 3rem;font-size:1.2rem;border:2px solid var(--gold);

  background:transparent;color:var(--gold);border-radius:8px;cursor:pointer;

  letter-spacing:0.3rem;transition:all 0.3s;font-family:inherit;

}

#btn-start-game:hover{background:var(--gold);color:#000}

#btn-start-game:disabled{opacity:0.4;cursor:not-allowed}



/* ===== Game Mode Selector ===== */

.mode-section{margin:1.5rem 0;text-align:center}

.mode-section h3{color:var(--gold-light);font-size:1.1rem;margin-bottom:0.8rem;letter-spacing:0.2rem}

.mode-cards{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}

.mode-card{

  width:200px;padding:0.8rem;border:2px solid var(--tile-border);border-radius:10px;

  background:var(--panel);text-align:center;cursor:pointer;transition:all 0.3s;

}

.mode-card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 6px 16px rgba(212,160,23,0.2)}

.mode-card.selected{border-color:var(--gold);background:rgba(212,160,23,0.15)}

.mode-card .mode-icon{font-size:1.8rem;margin-bottom:0.3rem}

.mode-card .mode-name{font-size:0.95rem;color:var(--gold-light);font-weight:bold;margin-bottom:0.2rem}

.mode-card .mode-desc{font-size:0.7rem;color:var(--text-dim);line-height:1.4}



/* ===================== MAIN LAYOUT ===================== */

#game-container{display:none;min-height:100vh}

.game-header{

  text-align:center;padding:0.8rem;

  background:rgba(139,0,0,0.3);

  border-bottom:1px solid var(--panel-border);

}

.game-header h1{font-size:1.6rem;color:var(--gold);letter-spacing:0.5rem}

.game-header .turn-info{color:var(--text-dim);font-size:0.9rem;margin-top:0.2rem;display:flex;align-items:center;justify-content:center;gap:0.45rem;flex-wrap:wrap}

.turn-info-meta{white-space:nowrap}

.turn-info-player{display:inline-flex;align-items:center;gap:0.32rem;white-space:nowrap}

.turn-info-avatar{width:20px;height:20px;border-width:1.5px;box-shadow:0 4px 10px var(--portrait-shadow, rgba(223,206,194,0.24));flex:none}



.game-body{

  display:grid;grid-template-columns:300px 1fr 260px;gap:0;min-height:calc(100vh - 80px);

}



/* ===================== LEFT PANEL - PLAYERS ===================== */

.left-panel{

  background:var(--panel);border-right:1px solid var(--panel-border);

  padding:1rem;overflow-y:auto;

  position:sticky;top:0;height:100vh;

}

.left-panel h2{

  color:var(--gold);font-size:1rem;margin-bottom:0.8rem;

  padding-bottom:0.5rem;border-bottom:1px solid var(--panel-border);

  letter-spacing:0.2rem;

}

.player-info-card{

  padding:0.8rem;margin-bottom:0.8rem;border-radius:8px;

  border:1px solid var(--tile-border);background:rgba(0,0,0,0.3);

  transition:all 0.3s;

}

.player-info-card.active{border-color:var(--gold);box-shadow:0 0 15px rgba(212,160,23,0.2)}

.player-info-card.eliminated{opacity:0.4;filter:grayscale(0.8)}

.player-info-card .pi-header{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem}

.player-info-card .pi-avatar{font-size:1.8rem}

.player-info-card .pi-name{font-size:1rem;font-weight:bold}

.player-info-card .pi-role{

  font-size:0.65rem;padding:1px 5px;border-radius:3px;

}

.pi-role-human{background:var(--gold);color:#000;font-weight:bold}

.pi-role-ai{background:#555;color:#ccc}

.player-info-card .pi-status{

  font-size:0.7rem;padding:2px 6px;border-radius:4px;margin-left:auto;

}

.status-normal{background:var(--jade-dark);color:#92c4a8}

.status-cold{background:var(--purple);color:#b8a0cc}

.status-bankrupt{background:#555;color:#aaa}

.pi-stats{display:grid;grid-template-columns:1fr 1fr;gap:0.3rem;font-size:0.8rem}

.pi-stat{display:flex;align-items:center;gap:0.3rem}

.pi-stat .label{color:var(--text-dim)}

.pi-stat .value{color:var(--gold-light);font-weight:bold}

.pi-props{margin-top:0.4rem;font-size:0.75rem;color:var(--text-dim)}

.pi-props-section{margin-top:0.5rem}

.pi-props-title{font-size:0.75rem;color:var(--text-dim);margin-bottom:0.3rem;display:flex;align-items:center;gap:0.3rem}

.pi-prop-item{

  display:flex;align-items:center;justify-content:space-between;

  font-size:0.73rem;padding:3px 6px;margin-bottom:2px;

  background:rgba(212,160,23,0.08);border-radius:4px;

  border-left:3px solid var(--gold);

}

.pi-prop-item .prop-name{color:var(--text);font-weight:bold}

.pi-prop-item .prop-level{color:var(--gold);font-size:0.65rem;margin:0 0.4rem}

.pi-prop-item .prop-rent{color:var(--jade);font-size:0.65rem}

.pi-shield{

  margin-top:0.4rem;font-size:0.75rem;color:#88ddff;

  display:flex;align-items:center;gap:0.3rem;

}

.pi-awakening{

  margin-top:0.4rem;font-size:0.75rem;color:#b87a9e;

  display:flex;align-items:center;gap:0.3rem;

}

.pi-awakening .awaken-bar{

  flex:1;height:6px;background:#333;border-radius:3px;overflow:hidden;margin:0 0.3rem;

}

.pi-awakening .awaken-bar-inner{

  height:100%;background:#b87a9e;border-radius:3px;

  transition:width 0.5s;

}

.pi-awakening .awaken-val{color:#9678b8;font-weight:bold}

/* 恩宠进度条 */

.pi-favor{

  margin-top:0.3rem;font-size:0.75rem;color:#c47a8a;

  display:flex;align-items:center;gap:0.3rem;

}

.pi-favor .favor-bar{

  flex:1;height:6px;background:#333;border-radius:3px;overflow:hidden;margin:0 0.3rem;

}

.pi-favor .favor-bar-inner{

  height:100%;background:#c47a8a;border-radius:3px;

  transition:width 0.5s;

}

.pi-favor .favor-val{color:#c49099;font-weight:bold}

/* 资产进度条 */

.pi-asset{

  margin-top:0.3rem;font-size:0.75rem;color:var(--gold);

  display:flex;align-items:center;gap:0.3rem;

}

.pi-asset .asset-bar{

  flex:1;height:6px;background:#333;border-radius:3px;overflow:hidden;margin:0 0.3rem;

}

.pi-asset .asset-bar-inner{

  height:100%;background:var(--gold);border-radius:3px;

  transition:width 0.5s;

}

.pi-asset .asset-val{color:var(--gold-light);font-weight:bold}

/* 银两进度条（用总资产条里面的银两比例） */

.pi-silver{

  margin-top:0.3rem;font-size:0.75rem;color:#88ccff;

  display:flex;align-items:center;gap:0.3rem;

}

.pi-silver .silver-bar{

  flex:1;height:6px;background:#333;border-radius:3px;overflow:hidden;margin:0 0.3rem;

}

.pi-silver .silver-bar-inner{

  height:100%;background:#88ccff;border-radius:3px;

  transition:width 0.5s;

}

.pi-silver .silver-val{color:#aaddff;font-weight:bold}



/* ===================== CENTER - BOARD ===================== */

.center-area{

  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;

  padding:1rem;position:relative;overflow:auto;

}

.board-wrapper{

  position:relative;width:1284px;height:980px;

}



/* Board center dice UI */

.board-center-ui{

  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);

  display:flex;flex-direction:column;align-items:center;gap:0.58rem;

  z-index:15;pointer-events:all;text-align:center;

  padding:10px 18px 12px;min-width:0;border-radius:28px;isolation:isolate;

}

.board-center-ui::before,

.board-center-ui::after{content:none}

.center-turn-banner{

  padding:0.4rem 1.2rem;margin-bottom:0;border-radius:20px;

  font-size:0.85rem;font-weight:bold;

  border:1px solid rgba(219,191,171,0.9);

  background:rgba(255,251,247,0.96);white-space:nowrap;

  box-shadow:0 6px 14px rgba(194,169,154,0.1), inset 0 1px 0 rgba(255,255,255,0.72);

}

.center-turn-banner.human-turn{border-color:#d8b38d;color:#b98967}

.center-turn-banner.ai-turn{border-color:#ccb8b4;color:#927f78}



.tile{

  position:absolute;width:88px;height:78px;

  background:var(--tile-bg);border:1.5px solid var(--tile-border);

  border-radius:6px;padding:0.15rem;cursor:pointer;

  transition:all 0.3s;display:flex;flex-direction:column;

  align-items:center;justify-content:center;text-align:center;

  font-size:0.65rem;overflow:hidden;

}

/* 事件格子用圆形 */

.tile-event-shape{border-radius:50%;width:82px;height:82px}

.tile:hover{border-color:var(--gold);z-index:10;transform:scale(1.08);box-shadow:0 0 20px rgba(212,160,23,0.3)}

.tile .tile-name{font-weight:bold;color:var(--text);font-size:0.72rem;margin-bottom:2px}

.tile .tile-type{font-size:0.65rem;color:var(--text-dim)}

.tile .tile-price{font-size:0.65rem;color:var(--gold)}

.tile .tile-owner{

  position:absolute;bottom:2px;right:4px;font-size:0.9rem;

}

.tile .tile-level{

  position:absolute;top:2px;right:4px;font-size:0.6rem;color:var(--gold);

}

/*

 * ===== 清朝宫廷等级配色体系 =====

 * 明黄 #F2C94C — 皇帝/皇后专属，最高尊（起点·养心殿）

 * 赤红 #C0392B — 正红，皇后级别（冷宫惩罚）

 * 杏黄 #E8A838 — 皇太子/皇贵妃级（高价宫殿 ≥400两）

 * 金黄 #D4A017 — 贵妃/妃级（中价宫殿 300~399两）

 * 香色 #C8956C — 嫔级（低价宫殿 200~299两）

 * 胭脂 #C45A6D — 正红偏色，宫女打赏

 * 紫禁 #8E4585 — 皇贵妃紫，暗算/密谋

 * 宝蓝 #2B6CB0 — 主位嫔妃，学堂/太医

 * 翠绿 #5B8C5A — 御花园/散心

 * 朱砂 #E25822 — 热闹场合，宴席

 * 藤紫 #9B59B6 — 赌坊妖冶

 * 橙金 #D4760A — 比武擂台

 * 桃粉 #D4618C — 比美擂台

 * 铜黄 #B8860B — 小铺商贾

 */



/* 1️⃣ 明黄 — 起点·养心殿（皇帝寝宫，至尊） */

.tile-start{

  border-color:#F2C94C;

  background:linear-gradient(135deg,#3d3010,#2a2008);

  box-shadow:inset 0 0 18px rgba(242,201,76,0.2);

}



/* 2️⃣ 宫殿资产 — 按价格分三档尊卑 */

/* 通过 JS 添加子类: tile-property-high / tile-property-mid / tile-property-low */

.tile-property{

  border-color:rgba(225,198,170,0.96);

}

/* 杏黄档（≥400两）— 皇太子/皇贵妃级：景仁宫、慈宁宫、坤宁宫、内务府、交泰殿 */

.tile-property.prop-high{

  border-color:#e2ba73;

  box-shadow:inset 0 0 0 1px rgba(232,185,110,0.26);

}

/* 金黄档（300~399两）— 贵妃/妃级：蓬莱洲、储秀宫、宝华殿、翊坤宫、御膳房、敬事房、长春宫、永寿宫 */

.tile-property.prop-mid{

  border-color:#d8b06c;

  box-shadow:inset 0 0 0 1px rgba(218,177,106,0.24);

}

/* 香色档（<300两）— 嫔级：碎玉轩、延禧宫、倚梅园、咸福宫、甘露寺 */

.tile-property.prop-low{

  border-color:#cfa487;

  box-shadow:inset 0 0 0 1px rgba(207,164,135,0.22);

}



/* 3️⃣ 赤红 — 冷宫（惩罚，正红威严） */

.tile-jail{

  border-color:#C0392B;

  background:linear-gradient(135deg,#2e0a0a,#1e0404);

  box-shadow:inset 0 0 18px rgba(192,57,43,0.2);

}



/* 4️⃣ 胭脂色 — 宫女（红偏暖，柔媚中有卑微） */

.tile-maid{

  border-color:#C45A6D;

  background:linear-gradient(135deg,#30181e,#200e14);

  box-shadow:inset 0 0 12px rgba(196,90,109,0.15);

}



/* 5️⃣ 紫禁色 — 暗算/密谋事件chest（深宫阴谋） */

.tile-chest{

  border-color:#8E4585;

  background:linear-gradient(135deg,#281428,#1a0a1e);

  box-shadow:inset 0 0 12px rgba(142,69,133,0.15);

}



/* 6️⃣ 翠绿 — 圣旨chance（玉玺翡翠色） */

.tile-chance{

  border-color:#5B8C5A;

  background:linear-gradient(135deg,#162816,#0c1a0c);

  box-shadow:inset 0 0 12px rgba(91,140,90,0.12);

}



/* 7️⃣ 宝蓝 — 学堂/太医院（文官/医官蓝） */

.tile-academy{

  border-color:#2B6CB0;

  background:linear-gradient(135deg,#10203a,#08142a);

  box-shadow:inset 0 0 15px rgba(43,108,176,0.18);

}

.tile-hospital{

  border-color:#3B82B8;

  background:linear-gradient(135deg,#0e1e34,#081428);

  box-shadow:inset 0 0 12px rgba(59,130,184,0.15);

}



/* 8️⃣ 翠绿 — 御花园（园林草木） */

.tile-garden{

  border-color:#6B9E6A;

  background:linear-gradient(135deg,#142a14,#0a1a0a);

  box-shadow:inset 0 0 15px rgba(107,158,106,0.15);

}



/* 9️⃣ 朱砂色 — 宴席feast（热闹喜庆） */

.tile-feast{

  border-color:#E25822;

  background:linear-gradient(135deg,#361408,#261004);

  box-shadow:inset 0 0 12px rgba(226,88,34,0.15);

}



/* 🔟 藤紫 — 赌坊gamble（妖冶不正） */

.tile-gamble{

  border-color:#9B59B6;

  background:linear-gradient(135deg,#261630,#180c22);

  box-shadow:inset 0 0 15px rgba(155,89,182,0.15);

}



/* 1️⃣1️⃣ 橙金 — 比武擂台arena（武将铠甲色） */

.tile-arena{

  border-color:#D4760A;

  background:linear-gradient(135deg,#342008,#241604);

  box-shadow:inset 0 0 15px rgba(212,118,10,0.18);

}



/* 1️⃣2️⃣ 桃粉 — 比美擂台beauty（脂粉气） */

.tile-beauty{

  border-color:#D4618C;

  background:linear-gradient(135deg,#301828,#200e1a);

  box-shadow:inset 0 0 15px rgba(212,97,140,0.15);

}



/* 1️⃣3️⃣ 铜黄 — 小铺shop（商贾铜钱色） */

.tile-shop{

  border-color:#B8860B;

  background:linear-gradient(135deg,#302408,#201804);

  box-shadow:inset 0 0 12px rgba(184,134,11,0.15);

}



/* 1️⃣4️⃣ 明黄偏暖 — 皇上设宴banquet（天子之宴） */

.tile-banquet{

  border-color:#E8C838;

  background:linear-gradient(135deg,#3a3010,#2a2208);

  box-shadow:inset 0 0 18px rgba(232,200,56,0.2);

}



.token{

  position:absolute;font-size:2.4rem;z-index:20;

  transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1);

  filter:drop-shadow(0 3px 6px rgba(0,0,0,0.9));

  pointer-events:none;line-height:1;

}



/* ===================== RIGHT PANEL ===================== */

.right-panel{

  background:var(--panel);border-left:1px solid var(--panel-border);

  display:flex;flex-direction:column;

  position:sticky;top:0;height:100vh;overflow:hidden;

}

.action-area{padding:1rem;border-bottom:1px solid var(--panel-border)}

.action-area h2{

  color:var(--gold);font-size:1rem;margin-bottom:0.8rem;

  letter-spacing:0.2rem;

}



/* Current turn indicator - moved to board center */



/* Dice - in board center */

.dice-display{

  position:relative;display:inline-flex;align-items:center;justify-content:center;

  width:86px;height:86px;padding:0;margin-bottom:0;

  border:1px solid rgba(192,156,136,0.82);border-radius:18px;

  background:rgba(255,252,248,0.99);backdrop-filter:blur(6px);

  overflow:hidden;isolation:isolate;

  box-shadow:0 0 0 5px rgba(255,249,244,0.72),0 4px 0 rgba(181,148,131,0.46),0 14px 26px rgba(162,130,116,0.24),inset 0 1px 0 rgba(255,255,255,0.94),inset 0 -10px 16px rgba(220,196,181,0.18);

  transition:transform 0.25s ease, box-shadow 0.25s ease;

}

.dice-display::before{content:'';position:absolute;inset:0;border-radius:inherit;background:transparent;pointer-events:none;z-index:2}

.dice-display::after{content:'';position:absolute;left:12%;right:12%;bottom:-12px;height:14px;border-radius:999px;background:rgba(132,104,91,0.18);filter:blur(5px);z-index:-1;pointer-events:none}

.dice-display .dice-face{display:block;width:100%;height:100%;object-fit:cover;object-position:center;transform:scale(1.08);filter:drop-shadow(0 4px 8px rgba(110,84,73,0.14));user-select:none;-webkit-user-drag:none}

.dice-display .dice-face.dice-face-tight{clip-path:inset(5px 0 5px 0);transform:scale(1.14)}

.dice-display.rolling{animation:diceShake 0.1s infinite;box-shadow:0 0 0 5px rgba(255,249,244,0.74),0 6px 0 rgba(181,148,131,0.42),0 18px 30px rgba(162,130,116,0.3),inset 0 1px 0 rgba(255,255,255,0.92),inset 0 -10px 18px rgba(220,196,181,0.2)}

@keyframes diceShake{

  0%,100%{transform:rotate(0)}

  25%{transform:rotate(-15deg) scale(1.08)}

  75%{transform:rotate(15deg) scale(1.08)}

}

#btn-roll{

/* ===================== CARD REVEAL ===================== */

.card-reveal{

.card.bad{

}

.card.warn{

}

.card .card-type{font-size:0.9rem;letter-spacing:0.3rem;margin-bottom:0.5rem}

.card.good .card-type{color:var(--jade)}

.card.bad .card-type{color:var(--red)}

.card.info .card-type{color:var(--gold)}

.card.warn .card-type{color:#cc8800}

.card .card-icon{font-size:4rem;margin-bottom:1rem}

.card .card-icon.card-icon-art{

}

}

.card .card-icon.card-icon-portrait .card-event-portrait{width:92px;height:92px;border-width:4px;margin:0}

.card .card-icon.card-icon-portrait .academy-skill-icon-card{display:block;width:100%;height:100%;margin:0;object-fit:cover;transform:scale(1.04);transform-origin:center}


.card .card-text{font-size:1rem;line-height:1.6;margin-bottom:1.5rem;color:var(--text)}

.card .card-effect{font-size:0.85rem;padding:0.4rem 0.8rem;border-radius:6px;margin-bottom:1.5rem}

.card.good .card-effect{background:rgba(46,139,87,0.3);color:#92c4a8}

.card.bad .card-effect{background:rgba(192,57,43,0.3);color:#c48a8a}

.card.info .card-effect{background:rgba(212,160,23,0.2);color:var(--gold-light)}

.card.warn .card-effect{background:rgba(180,130,40,0.18);color:#c4a84a}

.card .card-who{

  font-size:0.8rem;color:var(--text-dim);margin-bottom:0.8rem;

  padding:0.3rem 0.8rem;border-radius:12px;

  background:rgba(255,255,255,0.05);

}

.card .card-who .tt-player-chip{display:inline-flex;align-items:center;gap:0.35rem;vertical-align:middle;max-width:100%}

.card .card-who .tt-player-chip img,.card .card-who .tt-player-chip .portrait-fallback{flex:0 0 auto}

.card .card-who img.card-who-avatar{display:inline-block !important;width:20px !important;height:20px !important;min-width:20px !important;min-height:20px !important;max-width:20px !important;max-height:20px !important;object-fit:cover !important;border-radius:50% !important}





.card .card-auto{color:var(--text-dim);font-size:0.75rem;margin-top:0.5rem}

.card .card-btn{

  padding:0.5rem 2rem;border-radius:8px;cursor:pointer;

  font-size:0.9rem;font-family:inherit;

}

.card.good .card-btn{border:1.5px solid var(--jade);background:var(--jade);color:#fff}

.card.bad .card-btn{border:1.5px solid var(--red);background:var(--red);color:#fff}

.card.info .card-btn{border:1.5px solid var(--gold);background:var(--gold);color:#000}

.card.warn .card-btn{border:1.5px solid #cc8800;background:#cc8800;color:#000}

.mg-result.lose{background:rgba(160,80,70,0.2);border:1px solid var(--red);color:#c48a8a}

.mg-result.draw{background:rgba(212,160,23,0.2);border:1px solid var(--gold);color:var(--gold-light)}

.mg-result .mg-result-icon{font-size:2.5rem;display:block;margin-bottom:0.3rem}

.mg-vs{

  display:flex;align-items:center;justify-content:center;gap:1.5rem;

  margin:1rem 0;font-size:1.2rem;

}

.mg-vs .vs-item{

  padding:0.5rem 1rem;border-radius:10px;background:rgba(0,0,0,0.4);

}

.mg-vs .vs-label{font-size:0.7rem;color:var(--text-dim);display:block;margin-bottom:0.2rem}

.mg-vs .vs-icon{font-size:2rem}

.mg-vs .vs-text{font-size:1.5rem;font-weight:bold;color:var(--gold)}

.mg-close-btn{

  padding:0.6rem 2rem;border-radius:8px;cursor:pointer;

}

.mg-close-btn:hover{background:#b08848}

/* Wheel animation */

.mg-wheel-container{position:relative;width:220px;margin:0.8rem auto;display:flex;flex-direction:column;align-items:center}

.mg-wheel-img-wrap{position:relative;width:220px;height:220px}

.mg-wheel-img{width:100%;height:100%;object-fit:contain;border-radius:50%}

.mg-wheel{

  width:200px;height:200px;border-radius:50%;

  border:4px solid #c49a60;position:relative;overflow:hidden;

  transition:transform 3s cubic-bezier(0.17,0.67,0.12,0.99);

}

.mg-wheel-section{

  position:absolute;width:50%;height:50%;

  transform-origin:100% 100%;clip-path:polygon(0 0,100% 0,100% 100%);

}

.mg-wheel-pointer{

  position:absolute;top:-12px;left:50%;transform:translateX(-50%);

  font-size:1.5rem;z-index:2;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));

.mg-outfit-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin:0.9rem 0}

}

.mg-outfit::before{content:'';position:absolute;inset:0;background:transparent;pointer-events:none}

.mg-outfit .outfit-icon{display:flex;align-items:center;justify-content:center;width:92px;height:92px;margin:0 auto 0.45rem;padding:0;border-radius:20px;border:1px solid rgba(229,205,210,0.86);background:rgba(255,255,255,0.98);box-shadow:inset 0 1px 0 rgba(255,255,255,0.85),0 8px 18px rgba(201,173,168,0.14);font-size:2rem;isolation:isolate;overflow:hidden}

.mg-outfit .outfit-icon img,.rank-outfit img,.beauty-spotlight-art img{display:block;width:100%;height:100%;object-fit:cover;mix-blend-mode:multiply;filter:drop-shadow(0 10px 14px rgba(150,121,106,0.18)) contrast(1.04) saturate(0.9)}

.academy-skill-icon{display:block;width:54px;height:54px;margin:0 auto;object-fit:cover;transform:scale(1.05);transform-origin:center;filter:drop-shadow(0 8px 10px rgba(143,174,200,0.22))}

.academy-skill-icon-inline{display:inline-block;width:18px;height:18px;margin:0;vertical-align:middle;object-fit:cover;transform:none;filter:none}

.mg-result .mg-result-icon.mg-result-icon-skill{display:block;width:110px;height:110px;margin:0 auto 0.55rem;border-radius:24px;overflow:hidden;font-size:0;line-height:0}

.academy-skill-icon-result{width:100%;height:100%;margin:0;object-fit:cover;transform:scale(1.08)}

.academy-skill-badge{display:inline-flex;align-items:center;gap:0.32rem;padding:0.14rem 0.45rem;border-radius:999px;background:rgba(191,212,238,0.2);color:#6f8fae;font-weight:600;line-height:1.3}

.academy-skill-list{display:inline-flex;flex-wrap:wrap;gap:0.35rem;vertical-align:middle}


.mg-outfit .outfit-name{font-size:0.84rem;color:var(--text);font-weight:700}

.mg-outfit .outfit-desc{font-size:0.68rem;color:var(--text-dim);margin-top:0.12rem;line-height:1.55}

.mg-outfit .outfit-bonus{color:#a67e95;font-size:0.64rem;margin-top:0.28rem;font-weight:700;letter-spacing:0.04rem}

.mg-outfit .garden-dir-hint{color:#aaa !important;font-weight:400 !important}

.mg-ranking{margin:1rem 0 0.8rem}

.mg-rank-item{

}

.mg-rank-item.rank-1{background:rgba(255,247,235,0.96)}

.mg-rank-item.rank-2{background:rgba(255,250,246,0.94)}

.mg-rank-item.rank-3{background:rgba(255,251,248,0.92)}

.mg-rank-item.rank-4{background:rgba(255,252,249,0.9)}

.mg-rank-item.is-me{background:rgba(255,245,240,0.96)}

.mg-rank-item .rank-pos{font-size:1rem;min-width:24px;text-align:center}

.mg-rank-item .rank-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:rgba(200,180,170,0.15);color:#8a7a72;font-size:0.8rem;font-weight:600}

.mg-rank-item .rank-name{flex:1;color:var(--text);font-weight:500}

.mg-rank-item .rank-outfit{display:flex;align-items:center;justify-content:center;width:36px;height:36px;padding:0;border-radius:10px;border:none;background:rgba(255,255,255,0.98);isolation:isolate;overflow:hidden}

.mg-rank-item .rank-effect{font-size:0.72rem;font-weight:600;letter-spacing:0}

.mg-rank-item .rank-effect.positive{color:#8a9d7b}

.mg-rank-item .rank-effect.negative{color:#a08080}

.mg-rank-item .rank-effect.neutral{color:#9c9c9c}

.mg-judging{

  text-align:center;padding:1.05rem 0.8rem;

}

.mg-judging .judge-icon{display:flex;align-items:center;justify-content:center;margin:0 auto;animation:crownFloat 1.5s infinite ease-in-out}

.mg-judging .judge-icon .judge-portrait{width:78px;height:78px;border-width:3px}

.mg-judging .judge-text{color:#a67d74;font-size:0.96rem;margin-top:0.55rem;letter-spacing:0.18rem}

.beauty-judging-outfit{display:flex;align-items:center;gap:0.85rem;margin:1rem auto 0;max-width:320px;padding:0.85rem 0.9rem;border-radius:20px;border:1px solid rgba(225,195,204,0.7);background:rgba(255,250,247,0.98);box-shadow:0 10px 24px rgba(188,157,145,0.1)}

.beauty-comment-box{margin:0.55rem 0 0.9rem;padding:0.7rem 0.85rem;border-radius:14px;border:none;background:rgba(255,248,245,0.96);box-shadow:none}

.beauty-comment{font-size:0.95rem;line-height:1.75;color:#8d6b76;margin-top:0.3rem;font-weight:600}

.beauty-spotlight{display:flex;align-items:center;gap:0.8rem;margin:0.6rem 0 0.8rem;padding:0.75rem 0.9rem;border-radius:14px;border:none;background:rgba(255,250,247,0.96);box-shadow:none}

.beauty-spotlight.rank-1{background:rgba(255,247,235,0.98)}

.beauty-spotlight.rank-2{background:rgba(255,250,246,0.96)}

.beauty-spotlight.rank-3{background:rgba(255,251,248,0.94)}

.beauty-spotlight.rank-4{background:rgba(255,252,249,0.92)}

.beauty-spotlight-art{flex:none;display:flex;align-items:center;justify-content:center;width:72px;height:72px;padding:0;border-radius:16px;border:none;background:rgba(255,255,255,0.98);box-shadow:none;isolation:isolate;overflow:hidden}

.beauty-spotlight-rank{font-size:0.72rem;letter-spacing:0.12rem;text-transform:uppercase;color:#a08078;font-weight:600}

.beauty-spotlight-title{font-size:0.95rem;color:#856762;font-weight:600;margin-top:0.12rem}

.beauty-spotlight-desc{font-size:0.72rem;color:var(--text-dim);margin-top:0.16rem;line-height:1.58}

.beauty-result-note{margin-top:0.78rem}

.beauty-close-btn{border-color:#b8899d !important;background:#b8899d !important}



/* Awakening flash */

  --red:#e4a6ae;

  --red-dark:#cb8f98;

  --jade:#9acdbd;

  --jade-dark:#78b29f;

  --purple:#cab8e3;

  --purple-light:#ebe2f5;

  --bg:#fdf8f3;

  --panel:#fffaf5;

  --panel-border:#ead9cf;

  --text:#6f625d;

  --text-dim:#a18f87;

  --tile-bg:#eef6ef;

  --tile-border:#c9ddd1;

}

body{

  background-image:linear-gradient(160deg,rgba(255,251,242,0.92) 0%,rgba(255,250,240,0.88) 30%,rgba(255,248,238,0.84) 55%,rgba(253,247,237,0.8) 75%,rgba(255,251,243,0.86) 100%),url('./页面背景/背景纹理.PNG');

.player-card,.mode-card{background-image:linear-gradient(135deg,rgba(255,250,242,0.92),rgba(252,246,235,0.88)),url('./卡片纹理/卡片纹理.JPG');background-repeat:repeat}

.board-wrapper{filter:drop-shadow(0 18px 38px rgba(174,149,138,0.2))}

.tile{width:78px;height:78px;border:1.5px solid rgba(255,250,245,0.92);border-radius:18px;color:#fffaf7;background-color:rgba(255,248,242,0.96);background-image:linear-gradient(135deg,rgba(255,255,255,0.76),rgba(247,237,230,0.84)),url('./卡片纹理/卡片纹理.JPG');background-repeat:repeat;box-shadow:0 10px 24px rgba(186,169,160,0.16);padding:0;overflow:hidden;isolation:isolate}

/* ===== Typography & copy consistency ===== */

:root{

  --ui-heading:#9d7b67;

  --ui-text:#7d6a61;

  --ui-muted:#9d8b82;

  --ui-accent:#c79a76;

  --ui-fee:#6f9c8f;

}

body{font-family:'Microsoft YaHei UI','PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;color:var(--ui-text);letter-spacing:0.01em}

.tile-tooltip,.modal,.card,.player-info-card,.left-panel,.right-panel,.action-area,.minigame-panel{color:var(--ui-text)}

.modal h3,.card .card-type,.tile-tooltip .tt-name{font-weight:700;letter-spacing:0.08em}

.modal h3{font-size:1.18rem;line-height:1.4;margin-bottom:0.65rem}

.modal p,.card .card-text{font-size:0.94rem;line-height:1.78;color:var(--text)}

.card .card-type{font-size:0.9rem;line-height:1.35;margin-bottom:0.65rem}

.card .card-text{margin-bottom:1.2rem}

.card .card-effect{font-size:0.82rem;line-height:1.6}

.card .card-effect,.card .card-who,.card .card-auto,.tile-tooltip .tt-desc,.tile-tooltip .tt-label,.tile-tooltip .tt-special,.tile-tooltip .tt-no-owner{font-size:0.8rem;line-height:1.65}

.tile-tooltip .tt-row,.tile-tooltip .tt-rent-row,.pi-prop-item{font-size:0.78rem}

.tile-tooltip .tt-value{color:var(--text);font-weight:600}

.tile-tooltip .tt-value.gold,.pi-asset .asset-val,.card.info .card-type,.card.warn .card-type,.log-entry.important{color:var(--ui-accent)}

.tile-tooltip .tt-value.fee,.tile-tooltip .tt-rent-row .rent-val,.pi-prop-item .prop-rent{color:var(--ui-fee);font-weight:700}

.tile-tooltip .tt-rent-table{margin-top:0.45rem;padding-top:0.45rem;border-top:1px solid rgba(191,141,120,0.18)}

.tile-tooltip .tt-section-title{font-size:0.74rem;font-weight:700;letter-spacing:0.08em;color:var(--ui-accent);margin-bottom:0.2rem}

.tile-tooltip .tt-rent-row{padding:3px 0}

.tile-tooltip .tt-rent-row.current{color:var(--text);font-weight:600;background:rgba(216,179,141,0.12);border-radius:999px;padding:3px 8px}

.tile-tooltip .tt-rent-row.current .rent-lvl{color:var(--ui-accent)}

.tile-tooltip .tt-rent-row.current .rent-val{color:var(--ui-fee)}

.pi-prop-item .prop-level{color:#b08a71}

.pi-props-title,.pi-shield,.tile-tooltip .tt-desc,.tile-tooltip .tt-label,.tile-tooltip .tt-no-owner,.tile-tooltip .tt-special,.card .card-who,.card .card-auto{color:var(--ui-muted)}

/* ===================== BGM MUSIC CONTROL ===================== */

#bgm-btn{
  position:fixed;bottom:18px;right:18px;z-index:9999;
  width:38px;height:38px;border-radius:50%;border:none;
  background:rgba(255,249,238,0.85);
  color:#c49060;font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s ease;
  box-shadow:0 2px 10px rgba(188,157,145,0.18);
  backdrop-filter:blur(6px);
  opacity:0.55;
}
#bgm-btn:hover{
  opacity:1;
  transform:scale(1.08);
  box-shadow:0 3px 14px rgba(188,157,145,0.30);
}
#bgm-btn.playing{
  animation:bgm-pulse 2.5s ease-in-out infinite;
}

@keyframes bgm-pulse{
  0%,100%{opacity:0.55;box-shadow:0 2px 10px rgba(188,157,145,0.18)}
  50%{opacity:0.75;box-shadow:0 2px 14px rgba(196,144,96,0.35),0 0 0 3px rgba(196,144,96,0.08)}
}

#bgm-slider-wrap{
  position:fixed;bottom:62px;right:14px;z-index:9999;
  background:rgba(255,249,238,0.94);
  border:1px solid rgba(196,144,96,0.35);
  border-radius:16px;padding:12px 10px;
  backdrop-filter:blur(8px);
  box-shadow:0 4px 18px rgba(188,157,145,0.22);
  display:flex;flex-direction:column;align-items:center;gap:6px;
  opacity:0;pointer-events:none;
  transform:translateY(8px) scale(0.92);
  transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
}
#bgm-slider-wrap.open{
  opacity:1;pointer-events:auto;
  transform:translateY(0) scale(1);
}

#bgm-volume{
  -webkit-appearance:none;appearance:none;
  writing-mode:vertical-lr;direction:rtl;
  width:4px;height:90px;border-radius:2px;
  background:linear-gradient(to top,#d8a860 0%,#e8dcd0 100%);
  outline:none;cursor:pointer;
}
#bgm-volume::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:#c49060;border:2px solid #fff;
  box-shadow:0 1px 4px rgba(0,0,0,0.18);
  cursor:pointer;
}
#bgm-volume::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;
  background:#c49060;border:2px solid #fff;
  box-shadow:0 1px 4px rgba(0,0,0,0.18);
  cursor:pointer;
}

#bgm-vol-label{
  font-size:0.65rem;color:#b09080;white-space:nowrap;
}

function getTileArtwork(type='') {

  return TILE_ARTWORK[type] || TILE_ARTWORK.property;

}

function getBoardArtUrl(type='property') {

  const art = getTileArtwork(type);

  return `${art.src}?v=${TILE_ART_VERSION}`;

}

function getResolvedBoardIconType(opts={}, fallbackType='property') {

  const explicitType = normalizePortraitRuleTextPart(opts.tileType).trim();

  if (explicitType && TILE_ARTWORK[explicitType]) return explicitType;

  const text = [opts.title, opts.text, opts.effect, opts.who, opts.sourceTitle, opts.sourceTileName]

    .map(normalizePortraitRuleTextPart)

    .filter(Boolean)

    .join(' ');

  for (const rule of BOARD_CARD_ICON_RULES) {

    if (rule.keywords.some(keyword => text.includes(keyword))) return rule.type;

  }

  const emojiType = BOARD_CARD_ICON_EMOJI_MAP[opts.icon] || '';

  if (emojiType && TILE_ARTWORK[emojiType]) return emojiType;

  return fallbackType;

}

function getCardBoardIconHTML(type='property', label='事件图标') {

  const artUrl = getBoardArtUrl(type);

  return `<div class="card-icon card-icon-art" role="img" aria-label="${label}" style="--card-icon-image:url('${artUrl}')"></div>`;

}

function getModalBoardIconHTML(type='property', label='操作图标') {

  const artUrl = getBoardArtUrl(type);

  return `<div class="modal-visual"><div class="modal-icon modal-icon-art"><img class="modal-board-icon" src="${artUrl}" alt="${label}" draggable="false"></div></div>`;

}

function getMinigameHeaderIconHTML(type='property', title='') {

  const artUrl = getBoardArtUrl(type);

  return `<div class="mg-icon mg-board-icon-wrap"><img class="mg-board-icon" src="${artUrl}" alt="${title || '玩法图标'}" draggable="false"></div>`;

}

function inferBoardCardIconType(opts={}) {

  return getResolvedBoardIconType(opts, '');

}

function getBoardCardIconHTML(opts={}) {

  const portraitOverrideName = getCardPortraitOverrideName(opts);

  if (portraitOverrideName) {

    return `<div class="card-icon card-icon-portrait">${getPortraitHTML({ name:portraitOverrideName, className:'card-event-portrait', title:portraitOverrideName, emoji:opts.icon || '✨' })}</div>`;

  }

  const label = normalizePortraitRuleTextPart(opts.title).replace(/[【】]/g, '').trim() || '事件图标';

  return getCardBoardIconHTML(getResolvedBoardIconType(opts), label);

}





function getTileDisplayName(tile) {

  if (!tile) return '';

  if (tile.type === 'maid') return tile.name.replace(/\s*\(宫女\)\s*/g, '').trim();

  if (tile.type === 'property') return tile.name;

  return '';

}




function getFeeLabel(tileType='') {
  if (tileType === 'maid') return '打赏费';
  if (tileType === 'property') return '请安费';
  if (tileType === 'shop') return '购物消费';
  return '过路费';
}

function getTileFeeAmount(tile) {
  if (!tile) return 0;
  if (tile.type === 'maid') {
    if (tile.special === 'jinxi') return tile.baseRent + (tile.level || 0) * 15;
    return tile.baseRent || 0;
  }
  if (tile.type === 'property' || tile.type === 'shop') {
    return (tile.baseRent || 0) * Math.pow(2, tile.level || 0);
  }
  return tile.baseRent || 0;

function getPortraitPathByName(name='') {

  return PORTRAIT_MAP[name] || '';

}

function normalizePortraitRuleTextPart(part) {

  if (part === null || part === undefined) return '';

  try {

    return typeof part === 'string' ? part : String(part);

  } catch (error) {

    return '';

  }

}

function hasSpecificMaidMention(...parts) {

  const text = parts.map(normalizePortraitRuleTextPart).filter(Boolean).join(' ');

  return ['翠果','浣碧','流朱','宝娟','槿汐'].some(name => text.includes(name));

}

];

function getCardPortraitOverrideName(opts={}) {

  const textParts = [opts.title, opts.text, opts.effect, opts.who, opts.sourceTitle, opts.sourceTileName];

  if (hasSpecificMaidMention(...textParts)) return '宫女';

  const text = textParts.map(normalizePortraitRuleTextPart).filter(Boolean).join(' ');

  for (const rule of CARD_PORTRAIT_OVERRIDE_RULES) {

    if (rule.keywords.some(keyword => text.includes(keyword))) return rule.portrait;

  }

  return '';

}




function getCharacterTheme(name='') {

  return CHARACTER_THEME[name] || { accent:'#dfcec2', glow:'rgba(223,206,194,0.28)' };

}



function findPortraitNameFromText(...parts) {

  const text = parts.filter(Boolean).join(' ');

  for (const [keyword, portraitName] of TEXT_PORTRAIT_KEYWORDS) {

    if (text.includes(keyword)) return portraitName;

  }

  return '';

}



function getPortraitHTML({ name='', src='', className='side-portrait', title='', emoji='✨', accentColor='', glowColor='' } = {}) {

  return `<span class="${className} portrait-fallback"${styleAttr}>${emoji}</span>`;

function getEventVisualHTML(opts={}) {

  }

  const label = normalizePortraitRuleTextPart(opts.title).replace(/[【】]/g, '').trim() || '事件图标';

  return getModalBoardIconHTML(getResolvedBoardIconType(opts), label);

}





function getModalVisualHTML(icon, title, text) {

  const portraitOverrideName = getCardPortraitOverrideName({ icon, title, text });

  if (portraitOverrideName) {

    return `<div class="modal-visual">${getPortraitHTML({ name:portraitOverrideName, className:'modal-portrait', title:portraitOverrideName, emoji:icon || '✨' })}</div>`;

  }

  const portraitName = getEventPortraitName({ icon, title, text });

  const boardType = inferBoardCardIconType({ icon, title, text });


  if (boardType) {


    const art = getTileArtwork(boardType);

    const artUrl = `${art.src}?v=${TILE_ART_VERSION}`;

    const label = (title || '操作图标').replace(/[【】]/g, '').trim() || '操作图标';

    return `<div class="modal-visual"><div class="modal-icon modal-icon-art"><img class="modal-board-icon" src="${artUrl}" alt="${label}" draggable="false"></div></div>`;

  }

  if (portraitName) {

    return `<div class="modal-visual">${getPortraitHTML({ name:portraitName, className:'modal-portrait', title:portraitName, emoji:icon || '✨' })}</div>`;

  }

  return `<div class="modal-icon">${icon}</div>`;

}




function getPlayerChipHTML(player, avatarClass='tt-player-avatar') {

  return `<span class="tt-player-chip">${getPortraitHTML({ name:player.name, src:player.portrait, className:avatarClass, title:player.name, emoji:player.emoji })}<span>${player.name}</span></span>`;

}



function getCardWhoHTML(who='') {

  if (!who) return '';

  let html = who;

  const replacements = [];

  let tokenIndex = 0;

  const players = [...gameState.players].sort((a,b) => b.name.length - a.name.length);

  players.forEach(player => {

    const chipHTML = getPlayerChipHTML(player, 'card-who-avatar');

    [`${player.emoji} ${player.name}`, `${player.emoji}${player.name}`, player.name].forEach(pattern => {

      if (!pattern || !html.includes(pattern)) return;

      const token = `__CARD_WHO_${tokenIndex++}__`;

      html = html.split(pattern).join(token);

      replacements.push([token, chipHTML]);

    });

  });

  replacements.forEach(([token, chipHTML]) => {

    html = html.split(token).join(chipHTML);

  });

  return `<div class="card-who">${html}</div>`;

}

function getDiceFacePath(value=1) {

  const safeValue = Math.max(1, Math.min(6, Number(value) || 1));

  return `${DICE_ARTWORK[safeValue]}?v=${DICE_ART_VERSION}`;

function setDiceDisplayFace(value=1) {

  const display = document.getElementById('dice-display');

  const faceClass = safeValue === 2 ? 'dice-face dice-face-tight' : 'dice-face';

  display.innerHTML = `<img class="${faceClass}" src="${getDiceFacePath(safeValue)}" alt="骰子 ${safeValue} 点" draggable="false">`;

window.addEventListener('DOMContentLoaded', () => {

    progress += Math.random() * 15 + 5;

function initStartScreen() {

  const container = document.getElementById('player-select');

  let selectedId = null;

  let selectedMode = 'unlimited'; // default



  CHARACTERS.forEach(ch => {

    const card = document.createElement('div');

    card.className = 'player-card';

    card.dataset.id = ch.id;

    card.innerHTML = `

      <div class="check">✓</div>

      <div class="avatar">${getPortraitHTML({ name:ch.name, className:'start-portrait', title:ch.name, emoji:ch.emoji })}</div>

      <div class="pname">${ch.name}</div>

      <div class="pdesc">${ch.desc}</div>

      <div class="ptalent" style="font-size:0.7rem;color:var(--gold);margin-top:0.3rem;font-weight:bold"><img src="./数值/天赋.PNG" style="width:14px;height:14px;vertical-align:middle;margin-right:2px"> ${ch.talent}</div>

      <div class="ptalent-desc" style="font-size:0.6rem;color:var(--text-dim);margin-top:0.15rem;line-height:1.3">${ch.talentDesc}</div>

    `;

    card.addEventListener('click', () => {

      // Single select - deselect others

      document.querySelectorAll('.player-card').forEach(c => c.classList.remove('selected'));

      card.classList.add('selected');

      selectedId = ch.id;

      document.getElementById('btn-start-game').disabled = false;

    });

    container.appendChild(card);

  });



  // Mode selection

  document.querySelectorAll('.mode-card').forEach(mc => {

    mc.addEventListener('click', () => {

      document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));

      mc.classList.add('selected');

      selectedMode = mc.dataset.mode;

    });

  });



  document.getElementById('btn-start-game').addEventListener('click', () => {

    if (!selectedId) return;

    // Pick human + 3 random AI from remaining

    const human = CHARACTERS.find(c => c.id === selectedId);

    const others = CHARACTERS.filter(c => c.id !== selectedId);

    // Shuffle and pick 3

    for (let i = others.length - 1; i > 0; i--) {

      const j = Math.floor(Math.random() * (i + 1));

      [others[i], others[j]] = [others[j], others[i]];

    }

    const aiChars = others.slice(0, 3);

    startGame(human, aiChars, selectedMode);

  });

}

  addLog(`<img src="./棋盘图标/宫殿.PNG" style="width:14px;height:14px;vertical-align:middle;margin-right:2px;object-fit:contain" draggable="false"> 游戏开始！${modeNames[gameState.gameMode]}`, 'important');

  addLog(`<img src="./棋盘图标/宫殿.PNG" style="width:14px;height:14px;vertical-align:middle;margin-right:2px;object-fit:contain" draggable="false"> 你扮演 ${humanChar.emoji} ${humanChar.name}，另外三位嫔妃由AI操控。`, 'important');

function renderBoard() {

  const board = document.getElementById('board');

  const centerUI = document.getElementById('board-center-ui');

  const tooltip = document.getElementById('tile-tooltip');

  // Remove old tiles but keep center UI and tooltip

  Array.from(board.children).forEach(ch => {

    if (ch.id !== 'board-center-ui' && ch.id !== 'tile-tooltip' && !ch.classList.contains('token')) ch.remove();

  });

  const positions = getTilePositions();



  // 所有格子统一为1:1小圆角正方形，优先完整展示图标本体

  const assetTypes = new Set(['property','maid','shop']);

  const namedTypes = new Set(['property','maid']);

  gameState.tiles.forEach((tile, i) => {

    const el = document.createElement('div');

    // 宫殿按价格分三档尊卑保留 class，方便后续继续微调

    let propRank = '';

    if (tile.type === 'property') {

      if (tile.price >= 400) propRank = ' prop-high';

      else if (tile.price >= 300) propRank = ' prop-mid';

      else propRank = ' prop-low';

    }

    const showName = namedTypes.has(tile.type);

    const art = getTileArtwork(tile.type);

    el.className = `tile tile-${tile.type}${propRank}${showName ? ' tile-has-name' : ''}`;

    el.id = `tile-${i}`;

    el.style.left = positions[i].x + 'px';

    el.style.top = positions[i].y + 'px';

    el.style.setProperty('--tile-art-image', `url("${art.src}?v=${TILE_ART_VERSION}")`);

    el.style.setProperty('--tile-art-position', art.position || 'center center');



    let ownerDot = '';

    if (tile.ownerId) {

      const owner = gameState.players.find(p => p.id === tile.ownerId);

      if (owner) ownerDot = `<div class="tile-owner">${getPortraitHTML({ name:owner.name, src:owner.portrait, className:'owner-avatar', title:owner.name, emoji:owner.emoji })}</div>`;

    }

    let levelStr = '';

    if ((tile.type === 'property' || tile.type === 'shop') && tile.level > 0) {

      levelStr = `<div class="tile-level">${goldBricks(tile.level)}</div>`;

    }


    let priceStr = assetTypes.has(tile.type) ? `<div class="tile-price">${tile.price}两</div>` : '';

    let nameStr = showName ? `<div class="tile-name">${getTileDisplayName(tile)}</div>` : '';



    el.innerHTML = `

      <div class="tile-art" aria-hidden="true"></div>

      ${levelStr}

      ${priceStr}

      ${nameStr}

      ${ownerDot}

    `;







    // Tooltip events

    el.addEventListener('mouseenter', (e) => showTileTooltip(tile, i, el, positions[i]));

    el.addEventListener('mouseleave', () => hideTileTooltip());



    board.appendChild(el);

  });

}



function buildTooltipHTML(tile, tileIndex) {

  const typeNames = {start:'起点',property:'宫殿',chance:'圣旨',chest:'暗算',feast:'宴席',banquet:'御宴',gamble:'赌坊',hospital:'太医院',jail:'冷宫',garden:'御花园',arena:'擂台',beauty:'比美',maid:'宫女',academy:'学堂',shop:'小铺'};

  const typeName = typeNames[tile.type] || tile.type;



  let html = `<div class="tt-header">

    <span class="tt-name">${tile.name}</span>

    <span class="tt-type-badge tt-type-${tile.type}">${typeName}</span>

  </div>`;

  html += `<div class="tt-desc">${tile.desc}</div>`;



  // Property-specific info

  if (tile.type === 'property') {

function showTileTooltip(tile, tileIndex, tileEl, tilePos) {

  const tooltip = document.getElementById('tile-tooltip');

  tooltip.innerHTML = buildTooltipHTML(tile, tileIndex);



  // Position tooltip intelligently

  const board = document.getElementById('board');

  const boardRect = board.getBoundingClientRect();

  const tileRect = tileEl.getBoundingClientRect();



  // Show first to get dimensions

  tooltip.style.left = '0px';

  tooltip.style.top = '0px';

  tooltip.classList.add('visible');



  const ttW = tooltip.offsetWidth;

  const ttH = tooltip.offsetHeight;



  // Calculate position relative to board

  let left = tilePos.x + 55 - ttW / 2; // center above tile

  let top = tilePos.y - ttH - 8; // above tile



  // If tooltip would go above board, place below

  if (top < 0) {

    top = tilePos.y + 94;

  }

  // If tooltip would go below board

  if (top + ttH > 990) {

    top = tilePos.y - ttH - 8;

  }

  // Clamp horizontal

  if (left < 0) left = 4;

  if (left + ttW > 1284) left = 1280 - ttW;



  tooltip.style.left = left + 'px';

  tooltip.style.top = top + 'px';

}



function hideTileTooltip() {

  const tooltip = document.getElementById('tile-tooltip');

  tooltip.classList.remove('visible');

}



function getTilePositions() {

  const positions = [];

  const boardW = 1284, boardH = 980;

  const tileSize = 78;

  const gapX = (boardW - tileSize * 14) / 13;

  const gapY = (boardH - tileSize * 12) / 11;

  const sx = tileSize + gapX;

  const sy = tileSize + gapY;

  // Top row: tiles 0~13 (left to right, row 0) — 14格

  for (let i = 0; i <= 13; i++) {

    positions[i] = { x: i * sx, y: 0 };

  }

  // Right column: tiles 14~23 (top to bottom, col 13) — 10格

  // 14 at row 1, 23 at row 10

  for (let i = 14; i <= 23; i++) {

    positions[i] = { x: 13 * sx, y: (i - 13) * sy };

  }

  // Bottom row: tiles 24~37 (right to left, row 11) — 14格

  // 24 at col 13, 37 at col 0

  for (let i = 24; i <= 37; i++) {

    positions[i] = { x: (37 - i) * sx, y: 11 * sy };

  }

  // Left column: tiles 38~47 (bottom to top, col 0) — 10格

  // 38 at row 10, 47 at row 1

  for (let i = 38; i <= 47; i++) {

    positions[i] = { x: 0, y: (48 - i) * sy };

  }

  return positions;

}



function renderTokens() {

  document.querySelectorAll('.token').forEach(t => t.remove());

  const positions = getTilePositions();

  const board = document.getElementById('board');

  const posGroups = {};

  gameState.players.forEach(p => {

    if (p.status === 'bankrupt') return;

    if (!posGroups[p.position]) posGroups[p.position] = [];

    posGroups[p.position].push(p);

  });

  gameState.players.forEach(p => {

    if (p.status === 'bankrupt') return;

    const group = posGroups[p.position];

    const idxInGroup = group.indexOf(p);

    const offsetX = (idxInGroup % 2) * 30;

    const offsetY = Math.floor(idxInGroup / 2) * 30;

    const token = document.createElement('div');

    token.className = 'token';

    token.id = `token-${p.id}`;

    // 当前回合玩家加浮动动效
    if (gameState.players[gameState.currentPlayerIndex] === p && !gameState.gameOver) {
      token.classList.add('token-active');
    }

    token.innerHTML = getPortraitHTML({ name:p.name, src:p.portrait, className:'token-portrait', title:p.name, emoji:p.emoji });

    token.style.setProperty('--token-accent', getCharacterTheme(p.name).accent);

    token.style.left = (positions[p.position].x + 5 + offsetX) + 'px';

    token.style.top = (positions[p.position].y + 2 + offsetY) + 'px';

    board.appendChild(token);

  });

}

function aiDecideBuy(player, tile) {

  // AI strategy: buy if can afford and still have >= 300 silver remaining

  const remainAfter = player.silver - tile.price;

  if (remainAfter >= 200) return true;

  if (remainAfter >= 0 && player.properties.length < 2) return true; // be aggressive early

  return false;

}



function aiDecideUpgrade(player, tile) {

  const upgradeCost = getTileUpgradeCost(tile);

  const remainAfter = player.silver - upgradeCost;


  // Upgrade if can afford and still have decent silver

  if (remainAfter >= 300) return true;

  if (remainAfter >= 100 && tile.level < 2) return true;

  return false;

}



function aiDecideBail(player) {

  // Always bail out if affordable and have enough

  return player.silver >= 700;

}



function aiDecideHospital(player) {

  // Decide what to do in hospital

  if (!player.hasShield && player.silver >= 500) return 'shield';

  if (player.favorPoints < 30 && player.silver >= 400) return 'favor';

  if (player.silver >= 600 && !player.hasShield) return 'shield';

  return 'leave';

}



function aiDecideSellOrBankrupt(player) {

  // Always sell to survive

  return 'sell';

}

function showEventCard(opts) {

  // opts: { type, icon, title, text, effect, who, buttons[], autoClose, autoCloseMs, onAutoClose }

  const cardEl = document.getElementById('event-card');

  const reveal = document.getElementById('card-reveal');

  cardEl.className = `card ${opts.type || 'info'}`;

  const whoHTML = opts.who ? getCardWhoHTML(opts.who) : '';

  

  // 托管模式逻辑：

  // autopilot OFF → 所有卡片（包括AI的）都需要手动关闭

  // autopilot ON  → AI卡片自动关闭，人类玩家卡片仍需手动

  const shouldAutoClose = opts.autoClose && gameState.autopilot;

  

  let btnHTML = '';

  if (opts.buttons && opts.buttons.length > 0) {

    btnHTML = opts.buttons.map((b,i) => `<button class="card-btn" data-bi="${i}">${b.text}</button>`).join(' ');

  } else if (opts.autoClose && !shouldAutoClose) {

    // 非托管模式下，原本要自动关闭的卡片改为显示"确认"按钮

    btnHTML = `<button class="card-btn" data-bi="auto-confirm">确 认</button>`;

  }

  

  const autoHTML = shouldAutoClose ? '<div class="card-auto">托管处理中...</div>' : '';

  let iconHTML = `<div class="card-icon">${opts.icon || '📋'}</div>`;

  if (opts.customIconImg) {

    iconHTML = `<div class="card-icon card-icon-art" role="img" aria-label="${opts.title || '事件图标'}" style="--card-icon-image:url('${opts.customIconImg}')"></div>`;

  } else {

    try {

      iconHTML = getBoardCardIconHTML(opts);

    } catch (error) {

      console.error('getBoardCardIconHTML failed', error, opts);

    }

  }

  cardEl.innerHTML = `

    <div class="card-type">${opts.title || ''}</div>

    ${whoHTML}

    ${iconHTML}

    <div class="card-text">${opts.text || ''}</div>

    <div class="card-effect">${opts.effect || ''}</div>

    ${btnHTML}

    ${autoHTML}

  `;


  reveal.classList.add('show');

  if (opts.buttons && opts.buttons.length > 0) {

    opts.buttons.forEach((b,i) => {

      const el = cardEl.querySelector(`[data-bi="${i}"]`);

      if (el) el.addEventListener('click', () => { reveal.classList.remove('show'); if (b.action) b.action(); }, {once:true});

    });

  } else if (opts.autoClose && !shouldAutoClose) {

    // 非托管：点击"确认"按钮关闭卡片

    const confirmBtn = cardEl.querySelector('[data-bi="auto-confirm"]');

    if (confirmBtn) {

      confirmBtn.addEventListener('click', () => {

        reveal.classList.remove('show');

        if (opts.onAutoClose) opts.onAutoClose();

      }, {once:true});

    }

  }

  if (shouldAutoClose) {

    setTimeout(() => { reveal.classList.remove('show'); if (opts.onAutoClose) opts.onAutoClose(); }, opts.autoCloseMs || AI_DELAY.cardShow);

  }

}

function currentPlayer() {

  return gameState.players[gameState.currentPlayerIndex];

}



function onRollClick() {

  if (!isCurrentHuman()) return;

  rollDice();

}



function rollDice() {

  if (gameState.phase !== 'roll' || gameState.gameOver) return;

  const btn = document.getElementById('btn-roll');

  btn.disabled = true;

  const display = document.getElementById('dice-display');

  display.classList.add('rolling');



  let rolls = 0;

  const rollAnim = setInterval(() => {

    setDiceDisplayFace(Math.floor(Math.random() * 6) + 1);

    rolls++;

    if (rolls > 12) {

      clearInterval(rollAnim);

      const value = Math.floor(Math.random() * 6) + 1;

      gameState.diceValue = value;

      setDiceDisplayFace(value);

      display.classList.remove('rolling');

      const p = currentPlayer();

      addLog(`${p.emoji} ${p.name} 掷出了 ${value} 点。`);

      setTimeout(() => movePlayer(value), 400);

    }

  }, 80);

}



function movePlayer(steps) {

  const player = currentPlayer();

  const oldPos = player.position;

  const newPos = (oldPos + steps) % gameState.tiles.length;

  const passedStart = newPos < oldPos;

  player.position = newPos;



  animateTokenMove(player, oldPos, newPos, steps, () => {

    if (passedStart && newPos !== 0) {

      player.laps++;  // 记录经过起点次数

      handlePassStart(player, () => {

        triggerTileEvent(player, gameState.tiles[newPos]);

      });

    } else {

      triggerTileEvent(player, gameState.tiles[newPos]);

    }

  });

}

function animateTokenMove(player, from, to, steps, callback) {

  let current = from;

  let stepCount = 0;

  function nextStep() {

    stepCount++;

    current = (current + 1) % gameState.tiles.length;

    player.position = current;

    renderTokens();

    if (stepCount < steps) {

      setTimeout(nextStep, 150);

    } else {

      setTimeout(callback, 200);

    }

  }

  setTimeout(nextStep, 150);

}

          }});

        }

        btns.push({ text:`<img src="./数值/银两.PNG" style="width:14px;height:14px;vertical-align:middle;margin-right:2px"> 出售 (${sellPrice}两, 觉醒-1)`, class:'danger', action:()=>{

          sellPropertyAction(player, tile);

          closeModal(); checkAllVictoryConditions(player); finishTurn();

        }});

        btns.push({ text:'不了', class:'secondary', action:()=>{ closeModal(); finishTurn(); }});

        showModal('<img src="./棋盘图标/宫殿.PNG" style="width:18px;height:18px;vertical-align:middle;object-fit:contain" draggable="false">', `${tile.name} (你的宫殿)`,

          `当前等级 ${goldBricks(tile.level) || '0级'}（${tile.level}级）\n${player.silver >= upgradeCost ? `升级到 ${tile.level+1} 级需要 ${upgradeCost} 两，升级后请安费翻倍！\n` : ''}也可出售此宫殿获得 ${sellPrice} 两（觉醒 -1）。`,

          btns);

      }

    } else {

      // Max level, can still sell

      if (player.isAI) {

        addLog(`${player.emoji} ${player.name} 回到自家「${tile.name}」（已满级${goldBricks(3)}）。`);

        finishTurn();

      } else {

        const sellPrice = getPropertySellPrice(tile);

        showModal('<img src="./棋盘图标/宫殿.PNG" style="width:18px;height:18px;vertical-align:middle;object-fit:contain" draggable="false">', `${tile.name} (满级${goldBricks(3)})`,

          `此宫殿已满级！也可出售获得 ${sellPrice} 两（觉醒 -1）。`,

          [

            { text:`<img src="./数值/银两.PNG" style="width:14px;height:14px;vertical-align:middle;margin-right:2px"> 出售 (${sellPrice}两, 觉醒-1)`, class:'danger', action:()=>{

              sellPropertyAction(player, tile);

              closeModal(); checkAllVictoryConditions(player); finishTurn();

            }},

            { text:'不了', class:'secondary', action:()=>{ closeModal(); finishTurn(); }},

          ]);

      }

    }

  } else {

    // Other player's property - pay rent

    const owner = gameState.players.find(p => p.id === tile.ownerId);

    if (owner && owner.status !== 'bankrupt') {

      const rentName = getFeeLabel(tile.type);

      let rent = tile.baseRent * Math.pow(2, tile.level);

      // Check owner's rent_boost skill

      if (owner.skills && owner.skills.includes('rent_boost')) {

        rent = Math.floor(rent * 1.2);

      }

      // 皇后天赋：过路费收入+15%

      if (owner.talentBonus && owner.talentBonus.type === 'property_master') {

        rent = Math.floor(rent * (1 + owner.talentBonus.rentBoost));

      }

      // Check payer's noble_help skill

      if (player.skills && player.skills.includes('noble_help')) {

        rent = Math.floor(rent * 0.5);

        player.skills = player.skills.filter(s => s !== 'noble_help');

        addLog(`${player.emoji} ${player.name} 的「贵人相助」技能生效，${rentName}减半！`, 'success');

      }

      player.silver -= rent;

      owner.silver += rent;

      // 高额请安费打击自信：觉醒-1

      let rentAwakenPenalty = '';

      if (rent >= 100) {

        player.awakening = Math.max(0, player.awakening - 1);

        rentAwakenPenalty = '，觉醒 -1';

      }

      addLog(`${player.emoji} ${player.name} 向 ${owner.emoji} ${owner.name} 缴纳了「${tile.name}」的${rentName} ${rent} 两！${rentAwakenPenalty}`, 'danger');



      // Show card for ALL players (human & AI)

      showEventCard({

        type:'bad',icon:'💸',title:`【缴纳${rentName}】`,



        who:`${player.emoji} ${player.name}`,

        text:`踏入了 ${owner.emoji} ${owner.name} 的「${tile.name}」${goldBricks(tile.level)}`,

        effect:`${player.emoji}${player.name} -${rent}两 → ${owner.emoji}${owner.name} +${rent}两${rentAwakenPenalty}`,

        autoClose:player.isAI,autoCloseMs:2000,

        onAutoClose:player.isAI?()=>{renderBoard();renderPlayerList();finishTurn();}:null,

        buttons:player.isAI?null:[{text:'知道了',action:()=>{renderBoard();renderPlayerList();finishTurn();}}]

      });


    } else {

      finishTurn();

    }

  }

}



// ---------- SELL PROPERTY ----------

function sellPropertyAction(player, tile) {

  const sellPrice = getPropertySellPrice(tile);

  player.silver += sellPrice;

  tile.ownerId = null;

  tile.level = 0;

  player.properties = player.properties.filter(idx => idx !== tile.index);

  player.awakening = Math.max(0, player.awakening - 1);

  checkPropertyAwakening(player); // 重新计算宫殿觉醒

  addLog(`${player.emoji} ${player.name} 出售了「${tile.name}」获得 ${sellPrice} 两，觉醒 -1。`, 'danger');

  renderBoard(); renderPlayerList();

}

function drawCard(type, player, sourceTitle='') {


  // 流朱忠仆护盾：抵挡一次暗算事件

  if (type === 'bad' && player.hasLiuzhuShield) {

    player.hasLiuzhuShield = false;

    addLog(`${player.emoji} ${player.name} 的流朱挺身而出，替主人挡下了暗算！`, 'success');

    showEventCard({type:'good',icon:'<img src="./数值/令牌.png" style="width:14px;height:14px;vertical-align:middle;margin-right:2px;object-fit:contain" draggable="false">',title:'【流朱挡灾】',

      who:player.isAI?`${player.emoji} ${player.name}`:null,

      text:'暗算来袭！流朱冲上前来："要伤我家小姐，先过我这一关！"流朱以身挡灾，暗算被化解了。',

      effect:'流朱忠仆护盾消耗，暗算无效',

      autoClose:player.isAI,autoCloseMs:3000,

      onAutoClose:player.isAI?()=>{renderBoard();renderPlayerList();finishTurn();}:null,

      buttons:player.isAI?null:[{text:'流朱！😢',action:()=>{renderBoard();renderPlayerList();finishTurn();}}]});

    return;

  }



  const pool = type === 'good' ? GOOD_EVENTS : BAD_EVENTS;

  const event = pool[Math.floor(Math.random() * pool.length)];

  const isAI = player.isAI;

  

  // 根据事件本身的好坏决定卡片样式

  const isGoodEvent = event.isGood;

  const cardType = isGoodEvent ? 'good' : 'bad';

  const cardTitle = type === 'good' ? '【圣 旨】' : '【暗 算】';

  const cardIcon = type === 'good' ? '<img src="./棋盘图标/圣旨.PNG" style="width:14px;height:14px;vertical-align:middle;margin-right:2px;object-fit:contain" draggable="false">' : '<img src="./棋盘图标/暗算.PNG" style="width:14px;height:14px;vertical-align:middle;margin-right:2px;object-fit:contain" draggable="false">';

  const btnText = type === 'good' 

    ? (isGoodEvent ? '谢主隆恩' : '领旨') 

    : (isGoodEvent ? '哈哈哈' : '认栽');



  // 执行事件并应用noble_help技能

  function applyEventWithSkillCheck() {

    const silverBefore = player.silver;

    const favorBefore = player.favorPoints;

    event.apply(player, gameState);

    // 沈眉庄天赋：暗算事件损失减少30%

    if (!isGoodEvent && player.talentBonus && player.talentBonus.type === 'chest_resist' && type === 'bad') {

      const silverLost = silverBefore - player.silver;

      const favorLost = favorBefore - player.favorPoints;

      if (silverLost > 0) {

        const refund = Math.floor(silverLost * player.talentBonus.resistRate);

        player.silver += refund;

        addLog(`${player.emoji} ${player.name} 天赋「端庄持重」生效，银两损失减少 ${refund} 两`, 'success');

      }

      if (favorLost > 0) {

        const refund = Math.floor(favorLost * player.talentBonus.resistRate);

        player.favorPoints += refund;

        addLog(`${player.emoji} ${player.name} 天赋「端庄持重」生效，恩宠损失减少 ${refund}`, 'success');

      }

    }

    // 如果是坏事件且扣了银两，noble_help技能减免一半损失（基于天赋减免后的剩余损失）

    if (!isGoodEvent && player.skills && player.skills.includes('noble_help')) {

      const actualSilverLost = silverBefore - player.silver; // 天赋减免后的实际损失

      if (actualSilverLost > 0) {

        const refund = Math.floor(actualSilverLost / 2);

        player.silver += refund;

        player.skills = player.skills.filter(s => s !== 'noble_help');

        addLog(`${player.emoji} ${player.name} 的「贵人相助」技能生效，银两损失减半！退回 ${refund} 两`, 'success');

      }

    }

    addLog(`${player.emoji} ${player.name}: ${event.text} (${event.effect})`,isGoodEvent?'success':'danger');

    renderBoard();renderPlayerList();renderTokens();checkAllVictoryConditions(player);finishTurn();

  }



  showEventCard({

    type:cardType,icon:cardIcon,title:cardTitle,

    who:isAI?`${player.emoji} ${player.name}`:null,

    text:event.text,effect:event.effect,

    sourceTitle,

    autoClose:isAI,autoCloseMs:AI_DELAY.cardShow,

    onAutoClose:isAI?()=>{ applyEventWithSkillCheck(); }:null,

    buttons:isAI?null:[{text:btnText,action:()=>{ applyEventWithSkillCheck(); }}]

  });


}

function handleFeast(player) {

  const event = FEAST_EVENTS[Math.floor(Math.random() * FEAST_EVENTS.length)];



  if (event.win) {

    const amount = 100 + Math.floor(Math.random() * 200); // 赢100~300两

    player.silver += amount;

    addLog(`${player.emoji} ${player.name} 参加华妃宴席，得赏 ${amount} 两！`, 'success');

    showEventCard({

      type:'good', icon:event.icon, title:'【华妃请客】',

      who:player.isAI?`${player.emoji} ${player.name}`:null,

      text:event.text,

      effect:`银两 +${amount}`,

      autoClose:player.isAI, autoCloseMs:3500,

      onAutoClose:player.isAI?()=>{renderBoard();renderPlayerList();finishTurn();}:null,

      buttons:player.isAI?null:[{text:'谢华妃娘娘',action:()=>{renderBoard();renderPlayerList();finishTurn();}}]

    });

  } else {

    const rate = 0.1 + Math.random() * 0.1; // 扣10%~20%

    let amount = Math.max(50, Math.floor(player.silver * rate));

    // 检查贵人相助技能

    if (player.skills && player.skills.includes('noble_help')) {

      amount = Math.floor(amount * 0.5);

      player.skills = player.skills.filter(s => s !== 'noble_help');

      addLog(`${player.emoji} ${player.name} 的「贵人相助」技能生效，宴席损失减半！`, 'success');

    }

    player.silver -= amount;

    player.awakening = Math.max(0, player.awakening - 1); // 被华妃宰了，心态受挫

    const pct = Math.floor(rate*100);

    addLog(`${player.emoji} ${player.name} 参加华妃宴席，被宰 ${amount} 两（${pct}%），觉醒 -1！`, 'danger');

    showEventCard({

      type:'warn', icon:event.icon, title:'【华妃请客】',

      who:player.isAI?`${player.emoji} ${player.name}`:null,

      text:event.text,

      effect:`银两 -${amount}（${pct}%），觉醒 -1`,

      autoClose:player.isAI, autoCloseMs:3500,

      onAutoClose:player.isAI?()=>{renderBoard();renderPlayerList();finishTurn();}:null,

      buttons:player.isAI?null:[{text:'认栽',action:()=>{renderBoard();renderPlayerList();finishTurn();}}]

    });

  }

}



// ---------- BLOOD TEST (滴血认亲) ----------

function handleBloodTest(player) {

  // 三种结局：

  // A: 证明清白 + 借势上位 (30%) → 恩宠+20, 银两+200, 觉醒+3

  // B: 证明清白但皇上心里不舒服 (40%) → 恩宠-8, 觉醒+5

  // C: 没能证明清白，被打入冷宫 (30%) → 进冷宫1回合, 恩宠-15, 觉醒+8

  const roll = Math.random();



  if (player.isAI) {

    if (roll < 0.3) {

      // A: 清白 + 上位

      player.favorPoints += 20;

      player.silver += 200;

      player.awakening += 3;

      addLog(`${player.emoji} ${player.name} 滴血认亲证明清白，借势上位！恩宠+20, 银两+200`, 'success');

      showEventCard({type:'good',icon:'🩸',title:'【滴血认亲】',who:`${player.emoji} ${player.name}`,

        text:'祺贵人告发你私通，逼你滴血认亲！你沉着应对，不仅证明了清白，还借机揭露了祺贵人的阴谋，皇上龙颜大悦！',

        effect:'恩宠 +20, 银两 +200, 觉醒 +3',

        autoClose:true,autoCloseMs:3500,onAutoClose:()=>{renderBoard();renderPlayerList();checkAllVictoryConditions(player);finishTurn();}});

    } else if (roll < 0.7) {

      // B: 清白但皇上不舒服

      player.favorPoints = Math.max(0, player.favorPoints - 8);

      player.awakening += 5;

      addLog(`${player.emoji} ${player.name} 滴血认亲证明清白，但皇上心里不舒服。恩宠-8`, 'danger');

      showEventCard({type:'warn',icon:'🩸',title:'【滴血认亲】',who:`${player.emoji} ${player.name}`,

        text:'你证明了自己的清白，但滴血认亲的过程让皇上想起了不愉快的事情，虽然还了你公道，却对你疏远了几分...',

        effect:'恩宠 -8, 觉醒 +5',

        autoClose:true,autoCloseMs:3500,onAutoClose:()=>{renderBoard();renderPlayerList();checkAllVictoryConditions(player);finishTurn();}});

    } else {

      // C: 失败进冷宫

      const jailIdx = gameState.tiles.findIndex(t => t.type === 'jail');

function handleBanquet(player) {

  if (player.isAI) {

    // AI根据当前需求选择表演方向

    let perf;

    if (player.awakening >= 55) perf = BANQUET_PERFORMANCES.find(p=>p.id==='dance'); // 觉醒够了选恩宠向

    else if (player.favorPoints >= 90) perf = BANQUET_PERFORMANCES.find(p=>p.id==='poem'); // 恩宠够了选觉醒向

    else if (player.silver < 400) perf = BANQUET_PERFORMANCES.find(p=>p.id==='qin'); // 缺钱选银两向

    else perf = BANQUET_PERFORMANCES[Math.floor(Math.random() * BANQUET_PERFORMANCES.length)];

    

    const result = perf.results[Math.floor(Math.random() * perf.results.length)];

    player.favorPoints = Math.max(0, player.favorPoints + result.favor);

    player.silver += result.silver;

    if (result.awakening) player.awakening = Math.max(0, player.awakening + result.awakening);

    // 安陵容天赋：宴会恩宠额外+5

    let banquetTalentBonus = 0;

    if (player.talentBonus && player.talentBonus.type === 'banquet_favor') {

      banquetTalentBonus = player.talentBonus.value;

      player.favorPoints += banquetTalentBonus;

    }

    addLog(`${player.emoji} ${player.name} 在皇上宴会上${perf.name}，${result.good?'大获赞赏':'不太顺利'}！${banquetTalentBonus?'(天赋: 恩宠额外+'+banquetTalentBonus+')':''}`, result.good?'success':'danger');

    showEventCard({

      type:result.good?'good':'warn', icon:'', customIconImg:perf.img, title:'【皇上设宴】',

      who:`${player.emoji} ${player.name}`,

      text:result.text,

      effect:result.desc,

      autoClose:true, autoCloseMs:3500,

      onAutoClose:()=>{checkAllVictoryConditions(player);renderBoard();renderPlayerList();finishTurn();}

    });

  } else {

    // 人类玩家选择表演项目（带图片卡片）

    const panel = document.getElementById('minigame-panel');

    const banquetArtUrl = getBoardArtUrl('banquet');

    const dirColors = { '恩宠':'#b97070', '均衡':'var(--gold)', '银两':'#7aaabb', '觉醒':'#9a78b8' };

    const choiceCards = BANQUET_PERFORMANCES.map(perf => {

      const col = dirColors[perf.direction] || 'var(--gold)';

      return `
        <div class="mg-outfit" data-perf="${perf.id}" style="text-align:center">
          <div class="outfit-icon" style="font-size:0;line-height:0;margin-bottom:0.35rem">
            <img src="${perf.img}" style="display:block;width:80px;height:80px;margin:0 auto;object-fit:cover;border-radius:12px" draggable="false" />
          </div>
          <div class="outfit-name" style="color:${col}">${perf.name}</div>
          <div class="outfit-desc">${perf.dirDesc}</div>
        </div>
      `;

    }).join('');

    panel.innerHTML = `
      <div class="mg-icon mg-board-icon-wrap"><img class="mg-board-icon" src="${banquetArtUrl}" alt="皇上设宴" draggable="false"></div>
      <h3 style="color:#c4a84a">皇 上 设 宴</h3>

      <div class="mg-outfit-grid" style="grid-template-columns:1fr 1fr">${choiceCards}</div>
    `;

    document.getElementById('minigame-overlay').classList.add('show');

    panel.querySelectorAll('.mg-outfit').forEach(el => {

      el.addEventListener('click', () => {

        const perfId = el.dataset.perf;

        const perf = BANQUET_PERFORMANCES.find(p => p.id === perfId);

        panel.querySelectorAll('.mg-outfit').forEach(c => c.style.pointerEvents = 'none');

        el.classList.add('selected');

        setTimeout(() => {

          document.getElementById('minigame-overlay').classList.remove('show');

          const result = perf.results[Math.floor(Math.random() * perf.results.length)];

          player.favorPoints = Math.max(0, player.favorPoints + result.favor);

          player.silver += result.silver;

          if (result.awakening) player.awakening = Math.max(0, player.awakening + result.awakening);

          let banquetTalentExtra = '';

          if (player.talentBonus && player.talentBonus.type === 'banquet_favor') {

            player.favorPoints += player.talentBonus.value;

            banquetTalentExtra = `, 天赋额外恩宠+${player.talentBonus.value}`;

          }

          addLog(`${player.emoji} ${player.name} 在皇上宴会上${perf.name}，${result.good ? '获得赏赐' : '不太顺利'}。${banquetTalentExtra}`, result.good ? 'success' : 'danger');

          showEventCard({

            type: result.good ? 'good' : 'warn', icon: '', customIconImg: perf.img, title: `【皇上设宴 · ${perf.name}】`,

            effect: result.desc,

            buttons: [{ text: result.good ? '谢皇上' : '告退', action: () => { checkAllVictoryConditions(player); renderBoard(); renderPlayerList(); finishTurn(); } }]

          });

        }, 400);

      });

    });

  }

}

function handleGamble(player) {

  const isWin = Math.random() < 0.45; // 45%赢，55%输



  if (isWin) {

    const event = GAMBLE_EVENTS_WIN[Math.floor(Math.random() * GAMBLE_EVENTS_WIN.length)];

    const multiplier = 1 + Math.random(); // 赢1~2倍下注额

    const bet = 100 + Math.floor(Math.random() * 200);

    const winnings = Math.floor(bet * multiplier);

    player.silver += winnings;

    addLog(`${player.emoji} ${player.name} 在赌坊赢了 ${winnings} 两！`, 'success');

    showEventCard({

      type:'good', icon:event.icon, title:'【叶澜依的赌坊】',

      who:player.isAI?`${player.emoji} ${player.name}`:null,

      text:event.text,

      effect:`银两 +${winnings}`,

      autoClose:player.isAI, autoCloseMs:3500,

      onAutoClose:player.isAI?()=>{renderBoard();renderPlayerList();finishTurn();}:null,

      buttons:player.isAI?null:[{text:'再来！',action:()=>{renderBoard();renderPlayerList();finishTurn();}}]

    });

  } else {

    const event = GAMBLE_EVENTS_LOSE[Math.floor(Math.random() * GAMBLE_EVENTS_LOSE.length)];

    const rate = 0.1 + Math.random() * 0.15; // 输10%~25%

    let amount = Math.max(50, Math.floor(player.silver * rate));

    // 检查贵人相助技能

    if (player.skills && player.skills.includes('noble_help')) {

      amount = Math.floor(amount * 0.5);

      player.skills = player.skills.filter(s => s !== 'noble_help');

      addLog(`${player.emoji} ${player.name} 的「贵人相助」技能生效，赌坊损失减半！`, 'success');

    }

    player.silver -= amount;

    player.awakening = Math.max(0, player.awakening - 2); // 赌博迷心，觉醒-2

    const pct = Math.floor(rate*100);

    addLog(`${player.emoji} ${player.name} 在赌坊输了 ${amount} 两（${pct}%），觉醒 -2！`, 'danger');

    showEventCard({

      type:'warn', icon:event.icon, title:'【叶澜依的赌坊】',

      who:player.isAI?`${player.emoji} ${player.name}`:null,

      text:event.text,

      effect:`银两 -${amount}（${pct}%），觉醒 -2`,

      autoClose:player.isAI, autoCloseMs:3500,

      onAutoClose:player.isAI?()=>{renderBoard();renderPlayerList();finishTurn();}:null,

      buttons:player.isAI?null:[{text:'愿赌服输',action:()=>{renderBoard();renderPlayerList();finishTurn();}}]

    });

  }

}

function handleGarden(player) {

  if (player.isAI) {

    // AI根据当前需求选择方向

    let choiceId;

    if (player.awakening >= 45) choiceId = 'favor'; // 觉醒够高了，去争恩宠

    else if (player.favorPoints >= 60) choiceId = 'awakening'; // 恩宠够高了，去觉醒

    else if (player.silver < 300) choiceId = 'treasure'; // 缺钱找宝

    else {

      // 随机但有偏向：觉醒40% 恩宠35% 银两25%

      const r = Math.random();

      choiceId = r < 0.4 ? 'awakening' : r < 0.75 ? 'favor' : 'treasure';

    }

    const choice = GARDEN_CHOICES.find(c => c.id === choiceId);

    const event = choice.events[Math.floor(Math.random() * choice.events.length)];

    event.apply(player);

    const logType = event.isGood ? 'success' : 'danger';

    addLog(`${player.emoji} ${player.name} 在御花园选择${choice.name}：${event.text} (${event.effect})`, logType);

    showEventCard({

      type:event.isGood?'good':'bad',icon:event.icon,title:`【御花园·${choice.direction}】`,

      who:`${player.emoji} ${player.name}`,

      text:event.text, effect:event.effect,

      autoClose:true,autoCloseMs:2500,

      onAutoClose:()=>{checkAllVictoryConditions(player);renderBoard();renderPlayerList();finishTurn();}

    });

  } else {

    // 人类玩家：展示三选一

    showGardenMenu(player);

  }

}

function simulateArenaGame(game, player) {

  if (game === 'guess') {

    const dice1 = Math.floor(Math.random()*6)+1;

    const dice2 = Math.floor(Math.random()*6)+1;

    const total = dice1+dice2;

    const isBig = total >= 7;

    const aiGuessBig = Math.random() > 0.5;

    const won = (aiGuessBig && isBig) || (!aiGuessBig && !isBig);

    if (won) {

      const amt = 150 + Math.floor(Math.random()*250);

      player.silver += amt;

      player.awakening += 2;

      addLog(`${player.emoji} ${player.name} 在擂台猜大小中赢了 ${amt} 两！`, 'success');

      return {won:true, text:`掷出 ${dice1}+${dice2}=${total}（${isBig?'大':'小'}），猜对了！`, effect:`银两 +${amt}, 觉醒 +2`};

    } else {

      const amt = Math.max(50, Math.floor(player.silver * 0.12));

      player.silver -= amt;

      addLog(`${player.emoji} ${player.name} 在擂台猜大小中输了 ${amt} 两！`, 'danger');

      return {won:false, text:`掷出 ${dice1}+${dice2}=${total}（${isBig?'大':'小'}），猜错了！`, effect:`银两 -${amt}`};

    }

  } else if (game === 'rps') {

    const choices = ['rock','scissors','paper'];

    const aiChoice = choices[Math.floor(Math.random()*3)];

    const opponentChoice = choices[Math.floor(Math.random()*3)];

    if (aiChoice === opponentChoice) {

      addLog(`${player.emoji} ${player.name} 在擂台猜拳中平局。`);

      return {draw:true, text:'双方出了一样的，平局！', effect:'无事发生'};

    }

    const wins = {rock:'scissors',scissors:'paper',paper:'rock'};

    const won = wins[aiChoice] === opponentChoice;

    const nameMap = {rock:'<img src="./数值/石头.png" style="width:1em;height:1em;vertical-align:-0.15em;object-fit:contain;mix-blend-mode:multiply" draggable="false">石头',scissors:'<img src="./数值/剪刀.png" style="width:1em;height:1em;vertical-align:-0.15em;object-fit:contain;mix-blend-mode:multiply" draggable="false">剪刀',paper:'<img src="./数值/布.png" style="width:1em;height:1em;vertical-align:-0.15em;object-fit:contain;mix-blend-mode:multiply" draggable="false">布'};

    if (won) {

      const amt = 200 + Math.floor(Math.random()*200);

      player.silver += amt;

      player.awakening += 2;

      addLog(`${player.emoji} ${player.name} 在擂台猜拳中赢了 ${amt} 两！`, 'success');

      return {won:true, text:`出了${nameMap[aiChoice]}，对手出了${nameMap[opponentChoice]}，赢了！`, effect:`银两 +${amt}, 觉醒 +2`};

    } else {

      const amt = Math.max(50, Math.floor(player.silver * 0.15));

      player.silver -= amt;

      addLog(`${player.emoji} ${player.name} 在擂台猜拳中输了 ${amt} 两！`, 'danger');

      return {won:false, text:`出了${nameMap[aiChoice]}，对手出了${nameMap[opponentChoice]}，输了！`, effect:`银两 -${amt}`};

    }

  } else {

    // wheel

    const sections = [

      {label:'大赏',color:'#2e8b57',mult:3},

      {label:'小赏',color:'#4a90d9',mult:1.5},

      {label:'平安',color:'#888',mult:0},

      {label:'小罚',color:'#cc8800',mult:-1},

      {label:'大罚',color:'#c0392b',mult:-2},

      {label:'惊喜',color:'#9b59b6',mult:2.5},

    ];

    const idx = Math.floor(Math.random()*sections.length);

    const sec = sections[idx];

    const base = 100;

    if (sec.mult > 0) {

      const amt = Math.floor(base * sec.mult);

      player.silver += amt;

      addLog(`${player.emoji} ${player.name} 转到"${sec.label}"，得 ${amt} 两！`, 'success');

      return {won:true, text:`命运转盘停在了「${sec.label}」！`, effect:`银两 +${amt}`};

    } else if (sec.mult < 0) {

      const amt = Math.max(50, Math.floor(Math.abs(sec.mult) * base));

      player.silver -= amt;

      addLog(`${player.emoji} ${player.name} 转到"${sec.label}"，罚 ${amt} 两！`, 'danger');

      return {won:false, text:`命运转盘停在了「${sec.label}」！`, effect:`银两 -${amt}`};

    } else {

const WHEEL_SECTIONS = [

  { label:'大赏', color:'#7fae9f', amount:300, type:'win' },

  { label:'惊喜', color:'#b9a6d6', amount:250, type:'win' },

];




function startWheelGame(player) {

  const panel = document.getElementById('minigame-panel');

  const numSections = WHEEL_SECTIONS.length;

  const anglePerSection = 360 / numSections;

  const wheelSrc = './比武游戏/转盘圆盘.png';

  panel.innerHTML = `

    ${getArenaGameHeaderIconHTML('wheel','命运转盘')}

    <h3>命运转盘</h3>

    <div class="mg-subtitle">点击转盘，看命运如何安排！</div>

    <div class="mg-wheel-container">

      <div class="mg-wheel-pointer">🔻</div>

      <div class="mg-wheel-img-wrap">

        <img id="mg-wheel-img" class="mg-wheel-img" src="${wheelSrc}" style="cursor:pointer" />

      </div>

    </div>

    <div class="mg-subtitle" id="mg-wheel-hint" style="margin-top:0.5rem">点击转盘开始</div>

  `;

  const wheelImg = document.getElementById('mg-wheel-img');

  wheelImg.addEventListener('click', () => {

    wheelImg.style.pointerEvents = 'none';

    document.getElementById('mg-wheel-hint').textContent = '转盘旋转中...';

    const resultIdx = Math.floor(Math.random() * numSections);

    const targetSectionAngle = resultIdx * anglePerSection;

    const totalSpin = 360 * 5 + (360 - targetSectionAngle + anglePerSection / 2);

    let startTime = null;

    const duration = 3500;

    function animateSpin(timestamp) {

      if (!startTime) startTime = timestamp;

      const elapsed = timestamp - startTime;

      const progress = Math.min(elapsed / duration, 1);

      const eased = 1 - Math.pow(1 - progress, 3);

      const angle = eased * totalSpin;

      wheelImg.style.transform = 'rotate(' + angle + 'deg)';

      if (progress < 1) {

        requestAnimationFrame(animateSpin);

      } else {

        setTimeout(() => showWheelResult(player, resultIdx), 500);

      }

    }

    requestAnimationFrame(animateSpin);

  }, {once:true});

}

function handleMaidOrShop(player, tile) {

  const isMaid = tile.type === 'maid';

  const typeName = isMaid ? '宫女' : '小铺';

  const icon = isMaid ? '<img src="./棋盘图标/宫女.PNG" style="width:14px;height:14px;vertical-align:middle;margin-right:2px">' : '<img src="./棋盘图标/小铺.PNG" style="width:14px;height:14px;vertical-align:middle;margin-right:2px;object-fit:contain" draggable="false">';

  const rentName = getFeeLabel(tile.type);






  if (tile.ownerId === null) {

    // Can buy

    if (player.silver >= tile.price) {

      if (player.isAI) {

        setTimeout(() => {

          if (player.silver - tile.price >= 150) {

            player.silver -= tile.price;
